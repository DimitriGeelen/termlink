# Install Check — exercise the external-install path on every push (G-005).
#
# Why: `cargo install --git URL` (the documented installation path in
# CLAUDE.md) does NOT use the checked-in Cargo.lock. It does a fresh resolve
# against today's crates.io. Direct dep pins in our Cargo.toml don't constrain
# transitive deps (e.g. rmcp 1.3.0's caret on rmcp-macros let 1.4.0 slip in
# and break consumers — see T-1056, T-1060). Internal CI uses the lockfile
# and never exercises this path, so resolver drift was invisible until users
# hit it. This job catches that class of regression before release.
#
# Tradeoff: ~5 min CI time per push. Acceptable insurance for a broken
# install path.

name: Install Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-from-git:
    name: cargo install --git (no --locked)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Cache the cargo registry index + downloaded crates. Build artifacts
      # under ~/.cargo/install are NOT cached — we want a fresh build to
      # exercise the resolver and codegen path that external users hit.
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-install-check-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-install-check-

      - name: Install termlink from local git (no --locked)
        run: |
          # Mirror the documented external install path:
          #   cargo install --git https://github.com/.../termlink.git termlink
          # Substituting file://$PWD lets us test against this commit.
          # NO --locked: we want a fresh resolve, exactly what external
          # users get.
          cargo install --git "file://${GITHUB_WORKSPACE}" termlink --force

      - name: Smoke-test installed binary
        run: |
          # Confirms the install produced a runnable binary, not just a
          # compile-clean source tree.
          termlink --version
          termlink --help > /dev/null
