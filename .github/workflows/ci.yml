# CI workflow for TermLink - runs on push/PR to detect issues
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake clang

      - name: Cargo check
        run: |
          cargo check --workspace 2>&1 || (echo "=== CARGO CHECK FAILED ===" && exit 1)
