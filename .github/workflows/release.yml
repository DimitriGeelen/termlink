# GitHub Actions workflow for TermLink releases
# Copy to: .github/workflows/release.yml in the termlink repo
#
# Builds macOS (aarch64 + x86_64) and Linux (x86_64 + aarch64) binaries.
# Triggers on version tags (e.g., v1.0.0).

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14  # M1/M2/M3 runner
            artifact: termlink-darwin-aarch64
          - target: x86_64-apple-darwin
            os: macos-14  # Cross-compile for Intel on ARM runner (macos-13 deprecated)
            artifact: termlink-darwin-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install build dependencies
        run: brew install cmake

      - name: Build
        run: |
          rustc --version
          cargo build --release --target ${{ matrix.target }} -p termlink
          mkdir -p dist
          cp target/${{ matrix.target }}/release/termlink dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  build-linux:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: termlink-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            artifact: termlink-linux-aarch64

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install build dependencies (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y cmake clang

      - name: Install build dependencies (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Build
        run: |
          rustc --version
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
            export CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc
            export CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++
          fi
          cargo build --release --target ${{ matrix.target }} -p termlink
          mkdir -p dist
          cp target/${{ matrix.target }}/release/termlink dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/termlink-darwin-aarch64
            dist/termlink-darwin-x86_64
            dist/termlink-linux-x86_64
            dist/termlink-linux-aarch64
            dist/checksums.txt
          generate_release_notes: true
