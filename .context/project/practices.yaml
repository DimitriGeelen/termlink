# Framework Practices — Seeded by fw init
# These are universal operational practices derived from 96+ tasks of framework development.
# scope: universal — applies to all projects using the framework
# scope: project — specific to the originating project (not seeded)
#
# To add a project-specific practice: fw promote L-XXX --name "..." --directive D1
# Universal practices are synced from the framework via: fw governance sync (planned)

practices:
- id: P-001
  name: "Measure What Exists, Not What Should Exist"
  derived_from: D1
  description: >
    Don't design metrics for systems that don't exist. Build the minimum
    system, use it, observe what's measurable, then define metrics from observed reality.
  anti_pattern: >
    Spending days designing the perfect measurement system for something
    that doesn't exist yet.
  scope: universal
  inherited_from: framework
  status: active
  applications: 0

- id: P-002
  name: "Structural Enforcement Over Agent Discipline"
  derived_from: D2
  description: >
    Don't rely on agents or humans to remember and follow rules. Build
    gates, hooks, and checks that make non-compliance harder than compliance.
  anti_pattern: >
    Writing rules in markdown and hoping agents read and follow them.
  scope: universal
  inherited_from: framework
  status: active
  applications: 0

- id: P-003
  name: "Adoption Before Measurement"
  derived_from: D1
  description: >
    Create and use the system before trying to measure it. You need usage
    data before metrics are meaningful.
  anti_pattern: >
    Designing elaborate metrics dashboards before anyone uses the system.
  scope: universal
  inherited_from: framework
  status: active
  applications: 0

- id: P-004
  name: "Distinguish Existence from Quality"
  derived_from: D2
  description: >
    Counting files, fields, and checkboxes is easy but misleading. Design
    metrics that capture whether content is meaningful, not just present.
  anti_pattern: >
    Celebrating 100% task coverage when tasks contain TBD and see ticket.
  scope: universal
  inherited_from: framework
  status: active
  applications: 0

- id: P-005
  name: "Bootstrap Exceptions Are First-Class"
  derived_from: [D1, D2]
  description: >
    Every system has moments that precede its own rules. Document these
    explicitly rather than pretending they don't exist.
  anti_pattern: >
    Ignoring the initial rule-free period and hoping no one notices.
  scope: universal
  inherited_from: framework
  status: active
  applications: 0

- id: P-006
  name: "Hybrid Agent Architecture"
  derived_from: [D3, D4]
  description: >
    Build agents as two layers: bash scripts for mechanical operations
    (portable, reliable), markdown definitions for intelligence guidance
    (adaptable, documentable).
  anti_pattern: >
    Building agents as monolithic LLM prompts with no mechanical fallback.
  scope: universal
  inherited_from: framework
  status: active
  applications: 0

- id: P-007
  name: "Systematic Session Capture"
  derived_from: [D1, D2]
  description: >
    Before ending a session or changing focus, systematically scan the
    conversation for uncaptured work items, learnings, and decisions.
  anti_pattern: >
    Creating tasks only for the immediate next step, losing everything
    else discussed.
  scope: universal
  inherited_from: framework
  status: active
  applications: 0

- id: P-008
  name: "Tasks Must Carry Executable Context"
  derived_from: [D2, D1]
  description: >
    A task assigned to an agent must contain enough context for the agent
    to execute without rediscovering the design: authority link, relevant sections,
    extracted key decisions, and concrete acceptance criteria.
  anti_pattern: >
    Creating tasks with empty Design/Specification Records and expecting
    agents to figure out what to build.
  scope: universal
  inherited_from: framework
  status: active
  applications: 0

- id: P-009
  name: "Context Budget Awareness"
  derived_from: [D1, D2]
  description: >
    Treat context window as a finite, non-renewable resource. Commit early
    and often — each commit is a recovery checkpoint. Generate handovers AFTER work,
    never as skeletons. At critical budget level, the gate allows wrap-up operations
    (handover, task updates) while blocking new work.
  anti_pattern: >
    Running 72 tool calls without committing, generating skeleton handovers
    with [TODO] placeholders, then losing all session context.
  scope: universal
  inherited_from: framework
  status: active
  applications: 0

- id: P-010
  name: "Validate Acceptance Criteria Before Closing Tasks"
  derived_from: D2
  description: >
    Task completion status (work-completed) must be gated by acceptance criteria
    validation. Without it, tasks get marked complete while work continues,
    episodic snapshots freeze at premature closure, and post-closure commits
    go untracked. Critical for autonomous mode where no human catches the pattern.
  anti_pattern: >
    Marking tasks work-completed without verifying all acceptance criteria,
    then continuing to commit against the closed task ID.
  scope: universal
  inherited_from: framework
  status: active
  applications: 0
