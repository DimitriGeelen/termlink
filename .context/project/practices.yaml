practices:
- id: P-001
  name: Measure What Exists, Not What Should Exist
  derived_from: D1
  description: 'Don''t design metrics for systems that don''t exist. Build the minimum
    system, use it, observe what''s measurable, then define metrics from observed
    reality.

    '
  anti_pattern: 'Spending days designing the perfect measurement system for something
    that doesn''t exist yet.

    '
  scope: universal
  inherited_from: framework
  status: active
  applications: 0
- id: P-002
  name: Structural Enforcement Over Agent Discipline
  derived_from: D2
  description: 'Don''t rely on agents or humans to remember and follow rules. Build
    gates, hooks, and checks that make non-compliance harder than compliance.

    '
  anti_pattern: 'Writing rules in markdown and hoping agents read and follow them.

    '
  scope: universal
  inherited_from: framework
  status: active
  applications: 0
- id: P-003
  name: Adoption Before Measurement
  derived_from: D1
  description: 'Create and use the system before trying to measure it. You need usage
    data before metrics are meaningful.

    '
  anti_pattern: 'Designing elaborate metrics dashboards before anyone uses the system.

    '
  scope: universal
  inherited_from: framework
  status: active
  applications: 0
- id: P-004
  name: Distinguish Existence from Quality
  derived_from: D2
  description: 'Counting files, fields, and checkboxes is easy but misleading. Design
    metrics that capture whether content is meaningful, not just present.

    '
  anti_pattern: 'Celebrating 100% task coverage when tasks contain TBD and see ticket.

    '
  scope: universal
  inherited_from: framework
  status: active
  applications: 0
- id: P-005
  name: Bootstrap Exceptions Are First-Class
  derived_from:
  - D1
  - D2
  description: 'Every system has moments that precede its own rules. Document these
    explicitly rather than pretending they don''t exist.

    '
  anti_pattern: 'Ignoring the initial rule-free period and hoping no one notices.

    '
  scope: universal
  inherited_from: framework
  status: active
  applications: 0
- id: P-006
  name: Hybrid Agent Architecture
  derived_from:
  - D3
  - D4
  description: 'Build agents as two layers: bash scripts for mechanical operations
    (portable, reliable), markdown definitions for intelligence guidance (adaptable,
    documentable).

    '
  anti_pattern: 'Building agents as monolithic LLM prompts with no mechanical fallback.

    '
  scope: universal
  inherited_from: framework
  status: active
  applications: 0
- id: P-007
  name: Systematic Session Capture
  derived_from:
  - D1
  - D2
  description: 'Before ending a session or changing focus, systematically scan the
    conversation for uncaptured work items, learnings, and decisions.

    '
  anti_pattern: 'Creating tasks only for the immediate next step, losing everything
    else discussed.

    '
  scope: universal
  inherited_from: framework
  status: active
  applications: 0
- id: P-008
  name: Tasks Must Carry Executable Context
  derived_from:
  - D2
  - D1
  description: 'A task assigned to an agent must contain enough context for the agent
    to execute without rediscovering the design: authority link, relevant sections,
    extracted key decisions, and concrete acceptance criteria.

    '
  anti_pattern: 'Creating tasks with empty Design/Specification Records and expecting
    agents to figure out what to build.

    '
  scope: universal
  inherited_from: framework
  status: active
  applications: 0
- id: P-009
  name: Context Budget Awareness
  derived_from:
  - D1
  - D2
  description: 'Treat context window as a finite, non-renewable resource. Commit early
    and often — each commit is a recovery checkpoint. Generate handovers AFTER work,
    never as skeletons. At critical budget level, the gate allows wrap-up operations
    (handover, task updates) while blocking new work.

    '
  anti_pattern: 'Running 72 tool calls without committing, generating skeleton handovers
    with [TODO] placeholders, then losing all session context.

    '
  scope: universal
  inherited_from: framework
  status: active
  applications: 0
- id: P-010
  name: Validate Acceptance Criteria Before Closing Tasks
  derived_from: D2
  description: 'Task completion status (work-completed) must be gated by acceptance
    criteria validation. Without it, tasks get marked complete while work continues,
    episodic snapshots freeze at premature closure, and post-closure commits go untracked.
    Critical for autonomous mode where no human catches the pattern.

    '
  anti_pattern: 'Marking tasks work-completed without verifying all acceptance criteria,
    then continuing to commit against the closed task ID.

    '
  scope: universal
  inherited_from: framework
  status: active
  applications: 0
- id: PP-001
  name: Consumer hooks pass PROJECT_ROOT explicitly
  derived_from: D2
  description: Consumer project hooks must pass PROJECT_ROOT explicitly when invoking
    framework scripts — framework scripts fall back to git rev-parse which resolves
    to the framework repo, not the consumer project.
  anti_pattern: Pre-push audit blocked git push because it checked framework tasks
    dir instead of termlink tasks dir
  scope: project
  origin_task: T-290
  origin_date: '2026-03-26'
  promoted_from: L-027
  status: active
  applications: 15
- id: PP-002
  name: Rust env::set_var requires unsafe + SAFETY comment
  derived_from: D2
  description: Newer Rust editions require unsafe block around std::env::set_var —
    test code that sets env vars needs explicit unsafe with SAFETY comment explaining
    single-threaded access
  anti_pattern: Added via context agent
  scope: project
  origin_task: T-172
  origin_date: '2026-03-18'
  promoted_from: L-007
  status: active
  applications: 11
- id: PP-003
  name: Hook paths reference final install dir
  derived_from: D2
  description: Framework hook paths must reference final installation directory (symlinks),
    not version-specific paths. Test hook paths immediately after tool upgrades.
  anti_pattern: Added via context agent
  scope: project
  origin_task: T-020
  origin_date: '2026-03-19'
  promoted_from: L-012
  status: active
  applications: 9
- id: PP-004
  name: Quote-wrap user input before sh -c
  derived_from: D2
  description: Shell commands accepting user input must escape arguments before passing
    to sh -c — use single-quote wrapping with internal quote escaping
  anti_pattern: Added via context agent
  scope: project
  origin_task: T-064
  origin_date: '2026-03-10'
  promoted_from: L-004
  status: active
  applications: 5
- id: PP-005
  name: Handle ring-buffer wraparound in delta computations
  derived_from: D2
  description: 'Scrollback buffer delta calculations must handle wraparound: when
    delta >= buffer length, send the full buffer instead of computing a negative or
    zero-length slice.'
  anti_pattern: attach output froze when scrollback exceeded 8192 bytes
  scope: project
  origin_task: T-244
  origin_date: '2026-03-26'
  promoted_from: L-022
  status: active
  applications: 6
- id: PP-006
  name: Distinguish None-default from zero-default in CLI parameters
  derived_from: D2
  description: 'CLI parameter defaults: None (omitted) and zero-value are semantically
    different. since=0 means ''after event 0'' not ''from the start''. Test boundary
    conditions explicitly.'
  anti_pattern: Added via context agent
  scope: project
  origin_task: T-056
  origin_date: '2026-03-19'
  promoted_from: L-011
  status: active
  applications: 6
- id: PP-007
  name: Isolate hub tests that set TERMLINK_RUNTIME_DIR — ENV_LOCK + temp dir
  derived_from: D2
  description: Hub tests that set TERMLINK_RUNTIME_DIR must use ENV_LOCK and isolated
    temp dirs — without isolation, TLS cert from another test leaks and causes handshake
    failures
  anti_pattern: Added via context agent
  scope: project
  origin_task: T-172
  origin_date: '2026-03-18'
  promoted_from: L-006
  status: active
  applications: 4
- id: PP-009
  name: Run clippy --all-targets in CI to catch await_holding_lock
  derived_from: D2
  description: Run clippy in CI with --all-targets to catch await_holding_lock warnings
    in test code — holding std::sync::Mutex guards across .await points risks deadlocks
    that only manifest under load.
  anti_pattern: 19 await_holding_lock warnings in router.rs and pty.rs tests
  scope: project
  origin_task: T-230
  origin_date: '2026-03-26'
  promoted_from: L-021
  status: active
  applications: 4
- id: PP-010
  name: Capture subprocess exit codes explicitly in watcher scripts
  derived_from: D2
  description: Watcher scripts must capture subprocess exit codes explicitly — the
    || pattern swallows non-zero exits and causes false success reporting
  anti_pattern: Added via context agent
  scope: project
  origin_task: T-065
  origin_date: '2026-03-10'
  promoted_from: L-003
  status: active
  applications: 4
- id: PP-011
  name: Snapshot next_seq on startup for event-driven receivers
  derived_from: D2
  description: Event-driven receivers must snapshot next_seq on startup and poll only
    from that point — polling from seq 0 replays stale events from the ring buffer,
    causing ghost triggers from old transfers.
  anti_pattern: file receive picked up 30-min-old FileInit events
  scope: project
  origin_task: T-198
  origin_date: '2026-03-26'
  promoted_from: L-020
  status: active
  applications: 4
- id: PP-012
  name: Never output bare terminal commands — use push-based delivery
  derived_from: D2
  description: Never output bare terminal commands for the user — always use fw task
    review for inception decisions, termlink inject for results. The user built the
    tooling for push-based delivery; dumping commands is a P-002 violation (aspirational
    rule without structural enforcement). This feedback has been given 3+ times.
  anti_pattern: Added via context agent
  scope: project
  origin_task: T-967
  origin_date: '2026-04-12'
  promoted_from: PL-007
  status: active
  applications: 12
