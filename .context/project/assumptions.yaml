- id: A-024
  statement: AC class is detectable by prefix [REVIEW]/[RUBBER-STAMP]/unprefixed with
    >=80% accuracy on the current 47
  status: validated
  validation_method: TBD
  evidence:
  - outcome: 'S1 classifier achieves 87.5% (63/72) confident routing on current 72-AC
      corpus. See docs/reports/T-1884-S1-results.md. Taxonomy required 7 classes (3
      added beyond filing-time spec: OBSERVE-INFRA, OPERATOR-ACTION, TIME-GATED) plus
      RUBBER-STAMP prefix-trust default.'
    date: '2026-05-30'
  linked_task: T-1884
  created: '2026-05-30'
  resolved_date: '2026-05-30'
- id: A-025
  statement: Most [RUBBER-STAMP] Human ACs have mechanical Steps blocks that shell-validate
    without UI interaction
  status: validated
  validation_method: TBD
  evidence:
  - outcome: 'S2 dry-run: 4/16 PASS-LOOSE (25%) on first round. Below A-025 threshold
      (≥15/47). Failure mode interpretable: (a) parser misses complex shell (pipes/subshells
      → UNKNOWN), (b) MECHANICAL ACs often target REMOTE hosts (run-locally false
      FAIL), (c) Expected-block substring matching is weak. NOT a NO-GO signal — structural
      fix path clear (extend classifier, add termlink remote exec routing, parse Expected
      as assertions not substrings). Real-bug surfaced: T-1696 cron file is NOT byte-identical
      to source despite AC claim — value-already-delivered. Full evidence: docs/reports/T-1884-S2-results.md
      (223 lines, 16 ACs).'
    date: '2026-05-30'
  linked_task: T-1884
  created: '2026-05-30'
  resolved_date: '2026-05-30'
- id: A-026
  statement: ux-review wireup needs <=1 line per-task config (URL/page-id), preserving
    one-verb UX
  status: validated
  validation_method: TBD
  evidence:
  - outcome: 'S3 smoke on T-1486 (agent presence --watch): 4 frames captured in 8s,
      frame-body stability check passed PASS-LOOSE (2 distinct bodies modulo timestamp
      normalization — no flicker pattern). Technique: script -c capture + split on
      ANSI 2J+H + frame-body diff. Per-task config = 1 line (cmd + interval). KEY
      REFRAMING: filing-time A-026 assumed ux-review (browser Playwright) was the
      right tool — incorrect. All 8 REVIEW-RENDER ACs from S1 are --watch CLI views,
      NOT browser UI. CLI-watch frame-capture is the right validator. ux-review''s
      actual surface is Watchtower itself (zero of 47 ACs target Watchtower). Evidence:
      docs/reports/T-1884-S3-results.md + scripts/T-1884-S3-cli-watch.py.'
    date: '2026-05-30'
  linked_task: T-1884
  created: '2026-05-30'
  resolved_date: '2026-05-30'
