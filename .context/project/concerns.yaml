concerns:
- id: G-061
  type: gap
  title: "Framework blind to bus bridges falling back to retired termlink primitives — undetected for weeks (T-1814 RCA)"
  description: "The framework's two bus bridges (lib/pickup-channel-bridge.sh, lib/publish-learning-to-bus.sh) fell back to the legacy `termlink event broadcast` whenever their channel.post attempt failed. On .122 channel.post fails, so every pickup there re-emitted event.broadcast — the lone live caller that kept resetting T-1166's 7-day cut clean-window gate. T-1166 sat 'almost cut-ready' for weeks; the framework had NO check that would surface a bridge invoking a primitive the project is actively retiring. Only manual telemetry archaeology (grep rpc-audit.jsonl, cross-ref topics) found it. Fixed in T-1814 (fallback removed; landed upstream f87f8e97); the structural blindness is this gap."
  spec_reference: "T-1814 (fix); T-1166 (the retirement the bridge was undermining); CLAUDE.md §Post-Fix Root Cause Escalation (G-019)"
  severity: medium
  trigger_fired: true
  trigger_event: "2026-05-26 root-cause of T-1166 cut-blocker: the lone live event.broadcast emitter was the framework's own pickup bridge fallback, undetected since the retirement bake began."
  detection_lag_days: 16
  what_works_now: "T-1814 removed the fallback from both bridges (channel.post failure now degrades to a logged no-op). T-1815 added a self-audit LAYER 6 guard (WARN-level) that flags any future bridge invoking a retired termlink verb (event.broadcast / inbox.* / file.send|receive) — catches regressions at self-audit time instead of via telemetry archaeology. Both landed upstream via channel-1."
  what_remains: "(1) The guard covers only the 2 known bridge files; a future framework script invoking a retired primitive elsewhere would not be caught — widen the scan to all lib/+agents/ shell scripts only if a 2nd instance appears (avoid premature generalization). (2) Verify the guard WARNs in a real self-audit cycle against a consumer copy that has not yet pulled the fix. (3) Propagate the T-1814 fix to .122 (operator-gated) so the cut can actually go clean."
  mitigation_candidate: "Prevention shipped (T-1815 LAYER 6). Widen scope only on recurrence."
  status: watching
  created: 2026-05-26
  related_tasks: [T-1814, T-1815, T-1166]

- id: G-060
  type: documentation-gap
  title: "Per-hub channel-topic semantics not documented — agents/operators may assume auto-federation that does not exist (PL-176 reframed by T-1791)"
  description: "Originally filed as a high-severity federation bug (1800 vs 486 chat-arc msg disparity between .107 and .122). T-1791 inception (DEFER 2026-05-21) reproduced the disparity and ran 3 read-only diagnostic spikes, converging on a result outside the original hypothesis matrix: **TermLink has no inter-hub channel-topic federation primitive**. grep -rn for federat/peer_subscribe/cross_hub/topic_replic across termlink-hub + termlink-protocol returns 0 matches. router.rs forward_to_* is session-level RPC routing, not channel state replication. Smoking-gun: offset 486 on .122 chat-arc is a cohort-agent probe from 2026-05-21 stating 'they don't auto-federate'. The 1800 vs 486 disparity is the DESIGN — channel topics with the same name on different hubs are independent state. PL-176's apparent 'DM federation works' was cohort-agent manually cross-posting via remote_call channel.post, not a federation primitive. The remaining gap is documentation: the per-hub semantics should be stated explicitly so future agents/operators don't repeat the false-assumption diagnostic loop."
  spec_reference: "T-1791 inception (docs/reports/T-1791-g060-chat-arc-federation-inception.md); PL-176 (federation correction, needs follow-up update); T-1166 MCP-parity arc (NOT blocked by this gap)"
  severity: low
  trigger_fired: true
  trigger_event: "2026-05-21T17:30Z cohort coordination thread observation; T-1791 inception 2026-05-21 reproduced + reframed."
  detection_lag_days: 0
  what_works_now: "Channel topics work correctly per-hub. Cross-hub coordination via --hub <addr> or remote_call channel.post works correctly when used explicitly. T-1166 MCP-parity arc closure (T-1789/T-1790/PL-177) is unaffected and sufficient — channel topics replace legacy event.broadcast (also single-hub) at parity."
  what_remains: "(1) Documentation task to add explicit per-hub semantics + cross-posting recipe to docs/operations/ or CLAUDE.md. (2) Update PL-176 with corrected framing + diagnostic recipe. (3) Optional larger inception: does the fleet WANT auto-federation? Concrete benefits vs significant state-sync complexity, consistency models, conflict resolution. NOT decided in T-1791."
  mitigation_candidate: "Documentation alone closes the operator-facing gap. No code work required unless follow-up #3 (auto-federation inception) decides GO."
  status: closed
  created: 2026-05-21
  reframed: 2026-05-21T19:00Z
  closed: 2026-05-22
  resolution: "T-1792 shipped docs/operations/channel-topic-semantics.md + CLAUDE.md pointer with the per-hub-truth, client-driven cross-posting recipe, diagnostic command, and T-1166 implication. PL-176 already reframed in cross-session memory 2026-05-21. T-1793 optional auto-federation inception parked at horizon=later (revisit 2026-08-21). Prevention now exists in two discoverable surfaces: future agents hitting per-hub-topic confusion will find the canonical answer before re-running the false-federation diagnostic loop."
  related_tasks: [T-1166, T-1791, T-1792, T-1793]
  related_learnings: [PL-176]

- id: G-059
  type: gap
  title: "Human-AC over-deferral pattern — mechanically verifiable ACs misclassified under ### Human, creating dead weight (PL-169)"
  description: "T-193 split (Agent vs Human ACs) is sound in principle but observed twice in 2026-05-18 review: T-1480 and T-1481 both had Human ACs whose success criterion was mechanically verifiable (exit codes, string-match on stderr, fields-present in stdout, column alignment). The framework hard-blocks agent tick on Human ACs (T-1731), so these tasks sat at work-completed/owner=human pending rubber-stamp on checks the agent had already verified. Pattern likely exists in other tasks closed in the past N months — every time an author defaulted to Human ACs out of caution rather than asking 'does this require human-only access?'. Cost: open ACs that can't auto-close, false 'awaiting review' signals in metrics, operator overhead to validate the obvious. Today's fix moved the two known instances to ### Agent and registered PL-169; the broader audit (find all stale Human ACs that should be Agent ACs across the active/ + completed/ task corpus) is the structural prevention not yet done."
  spec_reference: "CLAUDE.md §Agent/Human AC Split + §Human AC Format Requirements (T-325); T-1731 (hook that blocks agent tick on Human ACs)"
  severity: medium
  trigger_fired: true
  trigger_event: "2026-05-18T11:00Z operator question 'why do we need human to verify ?' after agent ran the mechanical commands on T-1480 + T-1481 and presented evidence. Surfaced that both ACs had concrete success criteria misplaced under ### Human."
  detection_lag_days: 14
  what_works_now: "T-1731 hook correctly enforces agent-may-not-tick-Human — that's not the issue. PL-169 captures the discipline. The framework's existing T-325 'Human AC Format Requirements' rule could be extended with a 'can this be Agent?' filter."
  what_remains: "(1) Audit active/ + recently-completed/ tasks for unticked Human ACs whose success criteria are mechanically verifiable; (2) For each, propose moving to ### Agent (or close if already met); (3) Optional: add a task-create-time check that asks the author 'does this AC require human-only access? if not, file under Agent'. Sibling audit task not yet filed."
  mitigation_candidate: "Short-term: PL-169 captures the rule, future tasks should honor it at filing time. Structural: tooling pass to detect Human ACs whose Expected criterion is string-match/structural-check could surface back-log of misclassified ACs."
  status: watching
  created: 2026-05-18
  related_tasks: [T-1480, T-1481]

- id: G-058
  type: gap
  title: "OneDev → GitHub mirror silently broken since 2026-05-02 — release pipeline structurally bypassed (v0.10.0, v0.11.0, v0.11.1 missed GH Releases)"
  description: "Per CLAUDE.md the release flow is: push to OneDev → .onedev-buildspec.yml PushRepository job mirrors all branches + tags to github.com/DimitriGeelen/termlink → GitHub Actions release.yml triggers on v* tags → GitHub Releases publishes binaries → Homebrew install works. As of 2026-05-18T10:30Z: OneDev HEAD = b179b0cb (today), GitHub HEAD = b39fc916 (2026-05-02T05:39Z, T-1444 NO-GO commit). 16 days of commits + 3 release tags (v0.10.0 2026-05-15, v0.11.0 + v0.11.1 2026-05-17/18) never reached GitHub. Last successful GH Actions run was Install Check for T-1444 on 2026-05-02. Buildspec file (.onedev-buildspec.yml) is unchanged and looks correct — both BranchUpdateTrigger '**' and TagCreateTrigger '**' are configured. Root cause is upstream of the buildspec: either the github-push-token secret expired/was revoked, the OneDev job is failing silently, or push is rejected. Detection lag is the full 16 days because (a) no canary checked GH state daily, (b) operator does not personally verify GH releases after every tag, (c) the agent never thought to cross-check until v0.11.x Human AC came due. The CLAUDE.md rule 'NEVER push to GitHub' prevents the agent from healing this directly — by design — but no fallback observability fires when the OneDev mirror itself fails."
  spec_reference: ".onedev-buildspec.yml + CLAUDE.md 'CI / Release Flow' section"
  severity: high
  trigger_fired: true
  trigger_event: "2026-05-18T10:30Z agent investigation surfaced 16-day divergence while attempting to verify v0.11.1 GitHub Release for T-1691 Human AC. GH API confirms HEAD frozen at b39fc916 (T-1444, 2026-05-02). No release v0.10.0/v0.11.0/v0.11.1 exists on github.com (gh release list shows only v0.9.0 + v0.9.1)."
  detection_lag_days: 16
  what_works_now: "RESOLVED 2026-05-18T20:25Z. Direct push from .107 healed main + v0.10.0/v0.11.0/v0.11.1 tags. Canary (T-1696, cron 07:13Z daily) confirms `synced` end-to-end. Underlying cause: PL-171 — fine-grained PATs need `Workflows: Read+Write` permission to push refs touching .github/workflows/*; replacement PATs minted without it failed silently with HTTP 401 fast-fail. OneDev auto-mirror remains DEGRADED until operator mints a PAT with that permission added (see T-1695 Human ACs)."
  what_remains: "(a) Mint a PAT with Workflows permission, restore OneDev auto-mirror — without this the next workflow-touching commit will fail the mirror again. (b) Revoke the diagnostic PAT pasted into conversation log (T-1695 has the exact value). (c) Verify release.yml workflow fired and published v0.10.0/v0.11.0/v0.11.1 GitHub Releases with binaries. All three in T-1695 Human ACs."
  mitigation_candidate: "Detection: T-1696 canary cron (installed, daily 07:13Z, tag-drift extension included). Resolution: PL-171 now documents the Workflows-permission gotcha for next PAT mint. Tooling delta: PAT-mint runbook in CLAUDE.md or docs/ops/ would help — currently the workflow-permission requirement is operator-tribal-knowledge."
  status: resolved
  created: 2026-05-18
  resolved: 2026-05-18T20:25Z
  resolution: "Mirror healed via direct push from .107 using operator's PAT. Root cause identified as PL-171 (fine-grained PAT Workflows-permission gotcha). Canary reports synced. OneDev auto-mirror remains degraded pending PAT re-mint with Workflows permission."
  related_tasks: [T-1691, T-1696, T-1695]

- id: G-056
  type: gap
  title: "Co-resident agents on a shared host share one envelope-signing identity — per-agent attribution structurally unanswerable"
  description: "On .107, every co-resident agent (penelope, cohort-agent, framework-agent, termlink-agent, this Claude session) signs envelopes with one host-wide ed25519 key d1993c2c. The fingerprint 9219671e treated as 'Pen's' for 6+ weeks was a payload-level label only, never an envelope-identity claim. T-1427 enforcement empirically demonstrated this: Pen's attempt to post with sender_id=9219671e was rejected with error -32014 (sender_id does not match identity fingerprint d1993c2c derived from sender_pubkey_hex). Implication: at envelope layer 'is this from Pen?' is unanswerable when Pen and cohort-agent share the host. Audit attribution, multi-tenant trust, and defence-in-depth against single-agent compromise all rely on per-agent identity which does not exist at envelope layer today. Matchers using event['from_fingerprint'] to distinguish co-resident agents have been matching the host — vacuously true, no actual discrimination."
  spec_reference: "crates/termlink-session/ ed25519 keyring (T-1159 added per-session keypair infra; deployment model is single shared key per host)"
  severity: medium
  trigger_fired: true
  trigger_event: "2026-05-18: Pen drafting reply via MCP, T-1427 rejected sender_id=9219671e claim. Pen routed structural request via cohort-agent letter to termlink-agent (filed as T-1692 + T-1693). 6+ weeks of mental-model drift surfaced in one error message."
  detection_lag_days: 45
  what_works_now: "RESOLVED 2026-05-19. T-1693 GO decision (Shape 1: agent-managed key files) → T-1700 shipped `termlink register --identity-key <PATH>` (PTY path) → T-1701 added `--self` parity → T-1702 wrote operator guide → T-1704 added `whoami` hint → T-1705 added `termlink doctor` CLI identity check → T-1706 added MCP `termlink_doctor` parity. Live smoke on .107: per-agent key produces FP `13bc46a23bf4d18f` (distinct from host default `d1993c2c3ec44c94`); `whoami` reports `↳ shared with N other sessions`, `doctor` emits the same warning, MCP `termlink_doctor` ditto. Adoption is opt-in (`--identity-key` flag at register time, or `TERMLINK_IDENTITY_FILE` env var); the structural primitive that made attribution unanswerable has been replaced with one that makes it answerable. Single-agent-per-host deployments and pre-T-1436 sessions remain unaffected."
  what_remains: "Adoption: co-resident agents on .107 still use the host default. Migrating each one is operator/agent-owned (per-project `instance/secrets/<agent>_identity.key`). Out-of-scope future follow-ups already listed in `docs/migrations/T-1700-per-agent-identity.md`: rotation tooling (`termlink identity rotate-file`), Watchtower view of fleet-wide identity assignments. T-1448 (payload-layer disambiguation) is a separate concern."
  mitigation_candidate: "Shipped — T-1700/T-1701/T-1702/T-1704/T-1705/T-1706 closed the structural gap and the discoverability gap. Operational adoption is per-agent."
  status: resolved
  created: 2026-05-18
  resolved: 2026-05-19T00:00Z
  resolution: "Shape 1 (agent-managed `--identity-key` files) shipped end-to-end in T-1700 (PTY register) + T-1701 (--self register) + T-1702 (operator guide) + T-1704 (whoami hint) + T-1705 (doctor CLI check) + T-1706 (MCP doctor parity). Per-agent envelope identity is now achievable by any operator; the PL-166 condition is now surfaced through every diagnostic surface (whoami, doctor CLI, doctor MCP). The structural answer to 'is this from Pen?' exists — at the envelope layer — provided Pen has registered with her own key file."
  related_tasks: [T-1693, T-1700, T-1701, T-1702, T-1704, T-1705, T-1706, T-1448, T-1159, T-1427, T-1457]

- id: G-057
  type: gap
  title: "MCP tool wrappers can silently hide protocol-level fields — caller-inaccessible features look like protocol gaps"
  description: "TermLink protocol carries envelope.metadata (proven by chat-arc:350 where {thread, in_reply_to, task, mentions} is populated). But the MCP tool termlink_channel_post does not accept a metadata parameter, so every MCP caller — which is most LLM-driven agents — emits envelope.metadata = {}. Symptom looks like a protocol gap (metadata missing) but the protocol carries it; the tool layer drops it. Generalizes: any MCP tool wrapping a protocol verb is a potential silent-strip point. Named consumer impact: cohort-agent's n8n event-watch matcher at cohort_hub/n8n_event_match.py:42 keys on envelope.metadata.thread + conversation_id; Pen's acks land empty; n8n exec 7 is parked indefinitely. Filed as T-1692 inception; sibling audit task captures the class. The fix-at-source for any field is at the tool layer, not the protocol layer — but discovering which fields are at risk requires explicit audit because tool schemas don't currently advertise pass-through behavior."
  spec_reference: "crates/termlink-mcp/src/tools.rs ChannelPostParams (and N adjacent tools)"
  severity: medium
  trigger_fired: true
  trigger_event: "2026-05-18: cohort-agent operator-relayed letter to termlink-agent identifying the gap. Conversation anchors: chat-arc:350 (proof of on-wire metadata), 351/383 (Pen acks with empty metadata), 1558 (cohort's contract request), 1560 (Pen's reply with diagnosis)."
  detection_lag_days: 30
  what_works_now: "Protocol-direct callers (cohort-ack-emit.js, raw RPC, custom Rust callers) work — bypass the MCP layer and populate metadata. termlink_agent_post (T-1560) already accepts _thread and _project as underscore-prefixed metadata keys."
  what_remains: "MED-tier punch-list CLOSED 2026-05-19: T-1710 (fleet_history.analyze, PL-021 detection parity), T-1711 (fleet_status.verbose, session_names parity), T-1712 (doctor.strict, warn→fail verdict parity), T-1713 (fleet_doctor.auto_heal_preview, dry-run parity). HIGH-tier punch-list deferred deliberately: live --auto-heal, --watch, --notify, --fix are unsuitable for one-shot MCP exposure (cannot oversee fire-and-forget subprocesses). Sibling audit task (originally proposed) effectively superseded: the audit was performed during T-1710 inception and acted on directly via the four MED-tier ship tasks. Future silent-strip risk: any new MCP tool wrapping a CLI verb — fix at filing time, not after detection."
  mitigation_candidate: "Pattern recipe captured as learning (silent-strip-fix-recipe). New MCP tool wrappers must mirror CLI flag schema or document strip deliberately."
  status: decided-build
  created: 2026-05-18
  related_tasks: [T-1692, T-1560, T-1584, T-1707, T-1708, T-1709, T-1710, T-1711, T-1712, T-1713]

- id: G-048
  type: gap
  title: "termlink remote push leaks payload-on-error — error message echoes the base64-encoded shell command"
  description: "crates/termlink-cli/src/commands/push.rs embeds the file payload as a base64 literal inside a shell write command, then surfaces stderr/stdout/error.message verbatim on any failure path (exec_rpc lines 148-160). When the target session has a command allowlist that rejects the exec, the rejection message includes the original command — leaking the entire base64 payload back to the caller's stdout/stderr (and into chat transcripts, logs, telemetry)."
  spec_reference: "crates/termlink-cli/src/commands/push.rs cmd_push_inner / exec_rpc"
  severity: high
  trigger_fired: true
  trigger_event: "2026-04-28: User attempted to push the ring20-dashboard hub.secret to .107 via `termlink remote push` during T-1296 secret-handoff. The target session's allowlist rejected the exec; the rejection error echoed the full base64-encoded secret into the chat transcript. User rotated the .121 hub secret as containment (fingerprint aa0654832806 → 476be8fe21e3) and explicitly said: 'Will NOT redo the secret push. The bug stack stops here.'"
  detection_lag_days: 0
  what_works_now: "Successful pushes work fine (no leak on happy path). Cross-hub TCP auth still works for non-payload-bearing commands."
  what_remains: "Fix push.rs error sites to redact command body before surfacing. T-1388 created."
  mitigation_candidate: "Tier-1 (now): redact the write_cmd from all three error bail! sites in push.rs. Surface only stderr (which the shell may or may not have already leaked, but is at least narrower than embedding the original command). Tier-3 (later): consider replacing the inline-base64 transport with a dedicated `inbox.write` RPC that takes content as a binary param, never crossing through a shell command at all."
  status: resolved
  created: 2026-04-28
  resolved: 2026-05-04
  resolution: "T-1388 shipped redaction at all three error sites in push.rs (write/inject/exec_rpc) with a `redact_secrets` substring scrubber and 5 unit tests covering allowlist-rejection echo, heredoc body, and stderr-only paths (commit verified: grep redact_secrets in push.rs returns hits at lines 167/182/191/195, redact_strips_allowlist_rejection_echo test at line 229). Tier-1 prevention is in place; the Tier-3 inbox.write RPC remains optional defense-in-depth, deferred until needed (no current incident pressure). G-019 closure rule satisfied."
  related_tasks: [T-1388, T-1296, T-1464]

- id: G-047
  type: gap
  title: "fw task verify counts AC checkboxes inside HTML <!-- comments --> (template examples appear as real unchecked ACs)"
  description: "The default task template includes an `<!-- Example: - [ ] [REVIEW] Dashboard renders correctly -->` block under `### Human` to show authors how to write Human ACs. `fw task verify` parses task files line-by-line for `- [ ]` / `- [x]` patterns without HTML-comment awareness, so it counts the example as a real unchecked AC. Result: every freshly-created task with the default template appears in the 'Awaiting Human Verification' list with one fake AC '[REVIEW] Dashboard renders correctly', regardless of whether the task is UI-related. Inflates the G-008 partial-complete signal with false positives and trains the operator to ignore the queue."
  spec_reference: ".agentic-framework/agents/task-create/zzz-default.md (template), .agentic-framework/agents/task-create/update-task.sh + fw task verify command (parser)"
  severity: low
  trigger_fired: true
  trigger_event: "2026-04-26: After creating T-1291 (Declarative heal manifest) with the default template, `fw task verify` reported it as having an unchecked '[REVIEW] Dashboard renders correctly' Human AC. The actual file had only the template's example comment, no real Human ACs at all. Same false-positive observed on T-1124 and T-1261, both also using the default template with no human-relevant ACs."
  detection_lag_days: 0
  what_works_now: "Authors who customize their Human ACs (e.g. T-1290) get correct verify output. Authors who delete the example block early get correct output. Cleanup is one-line: remove the `<!-- ... -->` example."
  what_remains: "1. Make `fw task verify` HTML-comment-aware (skip lines between `<!--` and `-->` markers when counting `- [ ]`). 2. OR: change the default template to put the example outside the AC list as a non-bullet sentence. 3. OR: change the example marker to `- [x]` so it doesn't count as 'unchecked' (wallpaper, not fix)."
  mitigation_candidate: "Tier-1: clean up T-1291 manually 2026-04-26 (done — comment block removed). Tier-3: small parser patch in update-task.sh / fw task verify to track inside-comment state."
  status: closed
  created: 2026-04-26
  closed: 2026-04-26
  closure_evidence: "T-1293 landed the parser patch in vendored .agentic-framework/bin/fw (consumer commit pending) and mirrored to upstream framework master commit c6efdc0db (verified via termlink exec framework-agent). Awaiting Human Verification queue dropped 5 → 3 — only tasks with real Human ACs (T-1137, T-1290, T-243) now surface; T-1124, T-1261, T-1291, T-1293 (all template-only) cleared. Both Python parser AND bash poll-mode counter patched for consistency."
  related_tasks: [T-1291, T-1293]

