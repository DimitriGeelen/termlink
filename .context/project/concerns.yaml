  blast_radius_audit_2026-04-22: "164 [x] ACs with path-bearing tokens scanned across .tasks/ — 2 true false-completes (T-976, T-977), 9 false-positives (user-home paths like ~/.termlink/hubs.toml, URL fragments, PROJECT_ROOT placeholders). Both true hits now have work-completed repair tasks."
