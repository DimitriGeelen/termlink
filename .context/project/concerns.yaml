- id: G-054
  type: gap
  title: "fw task update self-recurses + deadlocks on flock — completion gate unreliable for any task"
  description: "`update-task.sh T-XXX --status work-completed` reliably forks a SECOND `update-task.sh T-XXX --status work-completed` as its own child, deadlocking both on the per-task flock acquired at line 528 (`keylock_acquire $TASK_ID`). Symptom: parent + child both block in `flock -x`, neither makes progress, the task file never moves from `active/` to `completed/`. Workaround: run via `bash -x .agentic-framework/agents/task-create/update-task.sh T-XXX --status work-completed` — `set -x` somehow alters bash's fork/subshell behavior enough to suppress the recursive fork, and the script completes cleanly. Plain bash invocation (with or without the fw shim) reliably hits the bug. Reproduces 4+ times across 2+ Claude Code sessions on this project (T-1467, T-1470, T-1471 last session; T-1472, T-1473 this session — only T-1473 was directly observed to be unblocked by the bash -x workaround). Source of the recursive fork is unidentified — update-task.sh has no obvious self-call site; outcome.sh / context.sh generate-episodic / fabric backprop are all candidates but none are clearly the trigger. The keylock FD-leak fix (T-1493) addressed daemon-spawned children inheriting the FD, not script-spawned same-script-recursion."
  spec_reference: ".agentic-framework/agents/task-create/update-task.sh:528 (keylock_acquire), .agentic-framework/lib/keylock.sh (FD-200+ allocation, no O_CLOEXEC). Per-task lock file at .context/locks/T-XXXX.lock. KEYLOCK_TIMEOUT default 300s — stale-lock cleanup happens but doesn't help the deadlock since both procs are alive."
  severity: high
  trigger_fired: true
  trigger_event: "Multiple consecutive lock-deadlocks during T-1472 / T-1473 work-completed transitions, 2026-05-04. Pattern matches G-019 (post-fix root-cause-escalation): sustained framework blindness — completion gate has been intermittently unreliable for >1 week; ad-hoc kill+rm-lock+retry workaround masks the bug instead of exposing it."
  detection_lag_days: "≥7 (first observed during T-1467 commit-cadence on prior session; not registered until 2026-05-04)"
  what_works_now: "Workaround is reliable: `bash -x .agentic-framework/agents/task-create/update-task.sh T-XXX --status <status>`. Manual recovery: `kill -9 <stuck-pids>; rm -f .context/locks/T-XXXX.lock`. Episodic generation can be run manually after the move: `.agentic-framework/agents/context/context.sh generate-episodic T-XXX`. The task move itself is partially completed before the deadlock fires (status updated, file moved), so retrying after kill+lock-rm often appears to work but actually skips the deferred steps."
  what_remains: "1. Identify the fork source — strace -f the deadlocked update-task.sh to find which line spawns the recursive child. 2. Audit all sub-process invocations in update-task.sh (FW_BIN outcome backprop, context.sh generate-episodic, fabric register, completion-ledger writers, arc.sh tag-add) for ones that re-enter update-task.sh directly or transitively. 3. Add a lock-acquisition guard: if the lock file's recorded PID is the same TASK_ID's parent process, abort with an explicit 'recursive update-task detected' error rather than blocking. 4. CI smoke test: `update-task.sh T-XXX --status work-completed` followed by `update-task.sh T-XXX --status started-work` should complete in <5s with a process-tree assertion that no second update-task.sh ever spawns. 5. Once root cause is fixed, remove the `bash -x` workaround and verify direct-call works."
  mitigation_candidate: "Tactical: document `bash -x` workaround in CLAUDE.md operations section so operators know how to unblock. Structural: identify the recursive fork point (likely ~50 lines of strace + grep). Reversibility: high — fix is a single-script change with regression test."
  status: mitigated
  created: 2026-05-04
  last_reviewed: 2026-05-06
  mitigated_at: 2026-05-06
  mitigation_evidence: "Bug went quiescent after upstream framework refresh (T-915) vendored in `keylock_subshell_close_cmd` (T-1493): closes inherited lock FDs in verification subshells so daemon-spawned children cannot keep the per-task flock held after the parent's keylock_release. update-task.sh:461 calls it before each `eval $cmd` subshell. Live evidence: 14+ consecutive clean `--status work-completed` transitions since 2026-05-05 (T-1602..T-1611 last session via update-task.sh + 4 synthetic repros T-1613..T-1616 + smoke test T-1617). Most recent operator-side `G-054 workaround` commit was 2026-05-05 (T-1504), 24h+ quiet. Strace + repro on this date (T-1612) failed to reproduce the deadlock across 4 distinct task shapes. Smoke regression test pinned at tests/test_g054_completion_smoke.sh: 10s ceiling, file-move assertion, lock-not-held assertion. If FD-leak family ever returns the smoke fails fast."
  related_tasks: [T-587, T-1493, T-1472, T-1473, T-1612]

- id: G-055
  type: gap
  title: "fw upgrade.sh CLAUDE.md template-overwrite silently regresses project-specific inline customizations — PL-124 hit ≥2 times within 7 days"
  description: ".agentic-framework/lib/upgrade.sh:356-360 implements `cp $project_claude $project_claude.bak` followed by writing a fresh CLAUDE.md from a framework-supplied template. The header comment claims 'preserve project sections, update governance' but the implementation cannot preserve INLINE modifications — additions made within governance section bodies (e.g. an extra row in the Quick Reference table, a project-specific clarification on bullet 3 of 'Copy-Pasteable Commands') are silently nuked because those sections are wholesale-replaced from template. The .bak file masks the regression: stale-copy on disk looks correct on grep, but the live file diverges. PL-124 documented the exact failure mode on 2026-05-02 from the T-1447 1.5.307→1.6.124 upgrade. The very next day (2026-05-03) a subsequent upgrade silently committed the same regression (CLAUDE.md mtime 2026-05-03 20:05:08 matches CLAUDE.md.bak mtime to within 3ms — typical of upgrade.sh's atomic-cp-then-write pattern). The regression sat undetected for 6 days, was discovered only when T-1629 inspected `git status` for an unrelated reason, and would have continued indefinitely had no one looked. PL-124's prescribed mitigation (post-upgrade restore from .bak) was either skipped, mis-applied, or insufficient — the working CLAUDE.md ended up regressed vs both HEAD and .bak."
  spec_reference: ".agentic-framework/lib/upgrade.sh:287-369 (CLAUDE.md merge logic), CLAUDE.md.bak (per-upgrade backup, no automated reconciliation), PL-124 (.context/project/learnings.yaml — prior capture of the same class without structural fix)"
  severity: medium
  trigger_fired: true
  trigger_event: "2026-05-09T21:10Z T-1629 audit: detected `working CLAUDE.md` differs from HEAD and from `CLAUDE.md.bak`, both of which agree. Working version dropped 3 lines: the consumer-project fw-path clarification on bullet 3 of Copy-Pasteable Commands, and 2 Quick Reference rows for /agent-handoff and /check-arc skills. Original loss event: 2026-05-03 20:05:08 (mtime). Detection lag: 6 days. PL-124 already documented this failure class from 2026-05-02 (T-1447); recurrence within 24h of the learning capture meant the prescription failed."
  detection_lag_days: "6"
  what_works_now: "PL-124 captures the failure mode and a manual mitigation. CLAUDE.md.bak is generated by upgrade.sh, so a post-hoc diff IS possible — it's just not automated. Git tracks CLAUDE.md, so any inspection that involves `git diff` reveals the regression immediately (this is how T-1629 caught it). The current restoration via `git checkout HEAD -- CLAUDE.md` is one command and idempotent."
  what_remains: |
    1. **Section-aware merge in upgrade.sh** — instead of wholesale replacing governance sections, parse them, identify project-specific lines (rows in the Quick Reference table that don't appear in the template; bullets where text diverges from template), and re-apply them after the template merge. Could use a 3-way merge: template-old vs template-new vs project-current.
    2. **Post-upgrade audit** — upgrade.sh should run `git diff CLAUDE.md` immediately after the write and fail loud (or pause for operator confirmation) if the diff has lines NOT in the template diff. This catches regressions at the moment of upgrade, not 6 days later.
    3. **Auto-cleanup of stale .bak** — after a configurable window (e.g. 1h post-upgrade), CLAUDE.md.bak should be auto-deleted by a hook so it cannot mask drift. Or: a daily audit hook fails if any CLAUDE.md.bak persists more than 24h.
    4. **Project-customization conventions** — encourage project-specific additions to live in clearly-delimited sections (e.g. a CLAUDE.md.local include) rather than inline in governance. Long-term cleanest fix.
  mitigation_candidate: "Tactical (T-1629): symptom restored via `git checkout HEAD -- CLAUDE.md`, .bak deleted. Structural: capture this G-055 entry, then open a follow-up framework task on upgrade.sh (Level C tooling). Path 2 (post-upgrade git-diff audit) is the lowest-friction insertion — ~20 lines of bash in upgrade.sh that runs after the template write."
