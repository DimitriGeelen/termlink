  what_remains: "1. Add `revisit_at: <ISO-date>` and optional `revisit_evidence_needed: <description>` frontmatter fields. 2. Cron job (daily, runs ~07:00) that scans active/ for `revisit_at <= today` and surfaces hits in Watchtower home + handover banner. 3. `fw task revisit-due` CLI to list ripe revisits on demand. 4. Backfill T-1428's ACs from the prose recipe so the audit is mechanically checkable. 5. Optional: `deferred-decisions.yaml` register linking each DEFER to (source-task, evidence-needed, revisit-date, sentinel-task-id) — but a per-task `revisit_at` may be sufficient. 6. Update inception templates so DEFER outcomes prompt for revisit_at + evidence_needed structurally."
  mitigation_candidate: "Tactical (now): add a `revisit_at` frontmatter field manually to T-1428 + T-1425, plus a daily cron grepping for them. Structural (T-1449 inception): design the proper revisit/sentinel mechanism — choose between per-task field, separate register, or both. Foundation-soak audit: T-1428 itself becomes the test case once the mechanism is wired."
