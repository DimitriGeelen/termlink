- id: G-052
  type: gap
  title: "Inception task silently auto-finalized to status=work-completed during unrelated commit, no decision recorded"
  description: "T-1448 (inception, status=started-work, owner=agent, focus set, no decision recorded) was silently moved from .tasks/active/ to .tasks/completed/ with status flipped to work-completed during commit `491b151a` (a heartbeat-script change unrelated to T-1448). Episodic snapshot was generated. The inception commit gate ('After 2 exploration commits, further commits are blocked until a decision is recorded') correctly fired in the gate-spirit but was structurally bypassed by silently 'completing' the inception. Watchtower visibility for the pending decision was lost — the operator's decision queue silently emptied. Discovered when operator said 'nothing on watchtower' and grep of git log showed the rename. Manual restoration via `git mv` registered as a normal rename in subsequent commit `9352d823`."
  spec_reference: ".agentic-framework/agents/task-create/update-task.sh + commit-msg hook + inception gate logic (CLAUDE.md Inception Discipline section). Fault is somewhere in the path that handles 'too many exploration commits' — it should BLOCK, not COMPLETE."
  severity: high
  trigger_fired: true
  trigger_event: "2026-05-02 evening session: T-1448 inception had spikes S1-S5 + Recommendation (Design A) filled but no decision recorded. During commit of unrelated heartbeat-from_project patch, framework moved T-1448 active → completed and set status=work-completed. Operator queried watchtower expecting to see the pending inception decision; saw nothing because the task was no longer in active/. Restoration done manually 2026-05-02T~22:55Z."
  detection_lag_days: 0
  what_works_now: "Manual restoration via git mv works — file is back in active/ with status=started-work and decision still pending, captured in commit 9352d823. Watchtower /inceptions list now shows T-1448 again."
  what_remains: "1. Identify which framework code path silently finalizes an inception when the commit gate threshold is exceeded — inception gate should BLOCK the commit, not COMPLETE the task. 2. Add an integration test: create inception, accumulate 3+ exploration commits, attempt 4th — expect commit BLOCKED, not task auto-completed. 3. Audit episodic snapshots generated without a corresponding decision — they are evidence of the same bug firing on other inceptions. 4. Watchtower could surface 'inceptions completed without decision recorded' as an anomaly to detect future fires."
  mitigation_candidate: "Tactical: nothing structural until root cause identified. Operators noticing missing inceptions can restore via git mv + sed (recipe demonstrated in commit 9352d823). Structural: framework PR after root-cause hunt to make the gate BLOCK rather than COMPLETE."
  status: mitigated
  resolution: "T-1626 (2026-05-06): Added check_inception_decision() to update-task.sh — fires on --status work-completed for workflow_type=inception, blocks unless `**Decision**: GO|NO-GO|DEFER` line is present in body. Bypass via --skip-inception-decision (logged) or --force. Regression test in tests/test_g052_inception_decision_gate.sh (3/3 PASS). Mirrored upstream to /opt/999-AEF (commit 04b0d474a). Local commit 45bc3169. Root cause was: the commit-msg hook only blocks COMMITS with no decision, but the lifecycle path that finalizes a task (update-task.sh status transition) had no equivalent gate — so any path that called update-task.sh with --status work-completed on an inception task with empty ACs would silently auto-finalize. The gate is now symmetric: both commit-msg AND update-task.sh refuse to let an inception complete without a decision. Captured as PL-153 (dual-gate principle for lifecycle discipline)."
  created: 2026-05-02
  last_reviewed: 2026-05-06
  related_tasks: [T-1448, T-1216, T-1626]

