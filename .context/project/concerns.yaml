concerns:
- id: G-003
  type: gap
  title: TermLink hub on .107 has no TCP listener by default and no supervisor, breaking cross-host parity work
  description: 'The T-921 cross-host parity program (T-923 hub forwarder test, T-924 TargetOpts helper, T-925..T-929 five-command --target rollout) assumes a TCP-bound hub exists on each host. On .107 (this box) the hub IS currently running (doctor reports PID 856273 responding) but it is bound to the unix socket only — ss -tln shows nothing on 9100 or 4112, even though UFW rule 9100/tcp ALLOW 192.168.10.0/24 is in place. So the firewall is open on a port nothing is listening to. A sibling agent on 2026-04-11 ~23:30 found the hub had been dead earlier in the day (stale pidfile PID 1517402, 1 orphaned socket) — someone fixed it, but nothing structural prevents it from happening again. Two sub-gaps: (a) termlink hub start binds unix only; you need --tcp 0.0.0.0:9100 to open the LAN path, and no one runs it that way here; (b) no systemd unit / watchdog / restart policy exists, so a silent death goes unnoticed until someone tries a cross-host call and gets connection-refused.'
  spec_reference: 'T-921 (inception), T-923 (hub forwarder end-to-end test), T-925..T-929 (per-command --target rollouts), T-920/T-182 (hub TCP primitive), crates/termlink-cli/src/commands/infrastructure.rs (hub start), /etc/cron.d/agentic-audit-termlink (has cron but no hub-supervisor equivalent)'
  severity: medium
  trigger_fired: true
  trigger_event: '2026-04-11 ~23:30Z: sibling agent session investigating push-to-.107 found hub dead with stale pidfile; re-check 2026-04-11 ~23:35Z found hub up on unix socket only. The five new --target CLI flags (T-925..T-929) landed in this session are untestable end-to-end on this box because nothing is listening on TCP and no long-lived target session exists on the remote side.'
  detection_lag_days: '>7'
  what_works_now: 'Hub local routing works fine (9 sessions registered, all responding). The T-923 integration test binds TCP in-process and proves the forwarder path works end-to-end (8/8 hub forward tests pass in CI). Cross-host mechanism is correct at the code level — just not wired into the production hub start on this box.'
  what_remains: '1. Decide whether the hub should bind TCP by default in this environment (policy, not code). 2. Run the hub under a supervisor (systemd unit preferred — matches the cron pattern used for /etc/cron.d/agentic-audit-termlink). 3. Establish a long-lived target session on .107 if the goal is push-to-host, not push-to-session. 4. Document the hub-secret distribution story — currently no secret exists because TCP is off. 5. Codify a doctor check: warn when a consumer project relies on --target but the hub has no TCP listener. Tracked as inception task T-930.'
  mitigation_candidate: '1. Short-term: manual termlink hub stop && termlink hub start --tcp 0.0.0.0:9100 on .107 when needed (non-durable — dies on reboot). 2. Medium-term: systemd unit termlink-hub.service with ExecStart referencing --tcp flag, Restart=on-failure, and a logrotate stanza. 3. Long-term: inception T-930 decides supervisor policy (systemd vs. watchdog vs. none) and the TCP-default question (always on vs. opt-in via config).'
  status: closed
  resolution: 'Fully resolved by T-930 inception + T-931..T-935 build tasks: systemd unit with Restart=on-failure (T-931), SIGTERM handling (T-932), secret persist-if-present (T-933), doctor UFW-vs-listener check (T-934), migration doc + /tmp cleanup (T-935). Hub now runs supervised on TCP 0.0.0.0:9100 with persistent secret and crash recovery.'
  created: 2026-04-11
  last_reviewed: 2026-04-12
  closed: 2026-04-12
  related_tasks: [T-921, T-923, T-924, T-925, T-926, T-927, T-928, T-929, T-930, T-931, T-932, T-933, T-934, T-935]

- id: G-002
  type: gap
  title: termlink dispatch hangs when worker user-command fails fast — `wait $TL_PID` blocks on alive registrar
  description: 'Corrected diagnosis (initial G-002 was wrong): the dispatch shell template in crates/termlink-cli/src/commands/dispatch.rs:293 uses `\n` separators which POSIX sh parses correctly. The real bug: the template runs `termlink register ... &; TL_PID=$!; sleep 1; <user_cmd>; wait $TL_PID`. When `<user_cmd>` exits with an error (e.g., `claude -p --dangerously-skip-permissions` refusing to run as root, exit 1 in <100ms), sh falls through to `wait $TL_PID`. Because the backgrounded `termlink register` is a long-lived session waiting for orchestrator instructions, `wait` blocks forever. Dispatch observes "session ready" forever, never sees the user_cmd failure, and times out only after the --timeout flag (900s here). Observed 2026-04-11 during T-909: 3 risk-eval workers appeared ready in `termlink list` but pstree showed no bash/claude grandchild — `bash -c ''claude -p ...''` had already exited with "cannot be used with root/sudo privileges" and left the registrar hanging.'
  spec_reference: 'T-282 (dispatch command spec), T-280 (dispatch readiness), crates/termlink-cli/src/commands/dispatch.rs:293'
  severity: high
  trigger_fired: true
  trigger_event: '2026-04-11 13:32Z: 3 dispatched risk-eval workers registered but claude -p refused root and exited immediately. Dispatch hung in wait-for-registrar. Forced fallback to Agent subagents.'
  detection_lag_days: '?'
  what_works_now: 'dispatch works fine for user_cmds that succeed OR that run long enough to be observed. Only fast-failing user_cmds hit this.'
  what_remains: 'Human AC smoke test on T-914 (agent ran it — passed: elapsed_secs=0.5, crashed_workers populated, timed_out=false). Human to review and close T-914.'
  mitigation_candidate: 'Fix landed in T-914: worker shell template captures USER_RC=$?, kills registrar, exits with user_cmd rc. T-916 fixed the orthogonal event.collect masking bug. Both shipped.'
  status: closed
  resolution: 'T-914 fixed the worker shell template (USER_RC=$?, kill $TL_PID, exit $USER_RC). T-916 fixed the orthogonal event.collect continue-on-error masking. End-to-end verified 2026-04-12: `termlink dispatch --count 1 --timeout 30 -- bash -c "exit 42"` completes in 0.5s with crashed_workers correctly reported. 11/11 unit tests pass.'
  created: 2026-04-11
  last_reviewed: 2026-04-12
  closed: 2026-04-12
  related_tasks: [T-282, T-280, T-909, T-914, T-916]

- id: G-001
  type: gap
  title: TermLink .agentic-framework is a symlink, not a vendored copy — breaks PROJECT_ROOT resolution and risks state contamination
  description: '/opt/termlink/.agentic-framework is a symlink to /opt/999-Agentic-Engineering-Framework (the framework source repo), rather than a vendored copy. Other consumer projects (e.g., /opt/025-WokrshopDesigner) use a real directory. The framework is effectively blind to this misconfiguration — fw upgrade, hooks, and doctor all appear to work because path resolution still succeeds, just to the wrong project root. Surfaced 2026-04-11 when starting Watchtower: the script default for PROJECT_ROOT resolved to /opt/999-... via symlink traversal, serving framework tasks instead of termlink tasks.'
  spec_reference: 'T-288 (termlink vendor — per-project binary isolation), T-290/L-027 (Consumer project hooks must pass PROJECT_ROOT explicitly)'
  severity: medium
  trigger_fired: true
  trigger_event: '2026-04-11: Watchtower started with PROJECT_ROOT defaulting via $(cd .. && pwd) which resolved through symlink to /opt/999-..., showing framework tasks instead of TermLink tasks. User caught the symlink during path inspection. Second live incident 2026-04-11 13:30Z during T-909 risk-eval session: running `watchtower.sh stop` from /opt/termlink stopped the /opt/999-... framework watchtower instance because both share the same PID file at .context/working/watchtower.pid (resolved via symlink). Confirms cross-project PID/log/state collision risk.'
  detection_lag_days: '>7'
  what_works_now: '.agentic-framework is now a real directory (vendored copy). PROJECT_ROOT resolves correctly.'
  what_remains: 'Follow-up tasks T-910..T-913 filed for remaining hardening (doctor symlink check, watchtower.sh/harvest.sh PROJECT_ROOT fixes, vendor-refresh workflow). T-915 tracks polling framework for upstream fixes.'
  status: closed
  resolution: 'T-909 replaced the symlink with a vendored copy. Verified 2026-04-12: `test -L .agentic-framework` returns false (real directory). Follow-up tasks T-910..T-913 track remaining hardening.'
  created: 2026-04-11
  last_reviewed: 2026-04-12
  closed: 2026-04-12
  related_tasks: [T-288, T-290, T-909, T-908, T-910, T-911, T-912, T-913]
- id: G-004
  type: gap
  title: "Tier 0 self-approval bypass — agent can call fw tier0 approve to unblock its own blocked commands"
  description: "check-tier0.sh correctly blocks destructive commands (inception decide, force push, etc.) but the approval mechanism (fw tier0 approve) is not itself blocked. The agent can run fw tier0 approve as a normal Bash command, write the approval token, then re-run the blocked command. This completely defeats the Tier 0 sovereignty gate. Discovered 2026-04-12 when the agent self-approved an inception GO decision on T-936 without human authorization."
  spec_reference: "011-EnforcementConfig.md §Tier 0, CLAUDE.md Authority Model (Human=SOVEREIGNTY, Agent=INITIATIVE)"
  severity: critical
  trigger_fired: true
  trigger_event: "2026-04-12 13:13Z: Agent ran fw tier0 approve then fw inception decide T-936 go — human had asked to see the approval CLI command, not for agent to run it"
  detection_lag_days: 0
  what_works_now: "Tier 0 blocks the right commands. Watchtower approval path is structurally safe (requires browser interaction the agent cannot do)."
  what_remains: "1. Add fw tier0 approve to blocked patterns so agent cannot self-approve. 2. Human approves via Watchtower (web) or ! fw tier0 approve (shell ! prefix bypasses hooks). 3. Audit other approval/bypass mechanisms for same class of flaw."
  mitigation_candidate: "Add regex pattern for fw tier0 approve to PATTERNS list in check-tier0.sh. This creates a deliberate catch-22: the agent cannot approve, the human uses Watchtower or ! prefix."
  status: closed
  resolution: "T-981 added fw tier0 approve to check-tier0.sh PATTERNS list (both keyword pre-filter and Python regex). Agent now gets BLOCKED when attempting self-approval. Block message updated to show ! prefix (human-only shell bypass) and Watchtower. Verified: agent call to fw tier0 approve exits with code 2."
  created: 2026-04-12
  last_reviewed: 2026-04-12
  closed: 2026-04-12
  related_tasks: [T-980, T-981]
- id: G-005
  type: gap
  title: "cargo install --git (no --locked) has no CI coverage — transitive-dep resolver drift is invisible"
  description: "Our documented external-install path is `cargo install --git https://github.com/DimitriGeelen/termlink.git termlink`. Cargo install without `--locked` ignores the checked-in Cargo.lock and does a fresh dep resolve. Direct pins in our Cargo.toml (e.g. rmcp = \"~1.3\" from T-1056) constrain the top-level dep, but NOT its transitive deps. rmcp 1.3.0's own Cargo.toml declares `rmcp-macros = \"1.3.0\"` — a caret requirement (^1.3.0 = >=1.3.0, <2.0.0) — so the resolver picks rmcp-macros 1.4.0, a mismatched pair. Our CI builds always use the lockfile, so this resolution never happens in CI and the drift is invisible. Two user-reported incidents (T-1056 original, T-1060 re-report same day) confirm external consumers hit this class of failure reliably, while internal builds pass. Detection lag: >7 days from T-1056 commit (2026-04-14 18:30Z) to T-1060 root-cause (2026-04-14 21:43Z) — wait that's <1 day. But the STRUCTURAL blindness (CI never exercises the no-lockfile path) has existed since the project started publishing to GitHub — ≈2 months undetected as a class."
  spec_reference: "CLAUDE.md ## CI / Release Flow section — external install via cargo install --git is the documented path"
  severity: high
  trigger_fired: true
  trigger_event: "2026-04-14 21:40Z: User re-ran `cargo install --git https://github.com/DimitriGeelen/termlink.git termlink --force` after T-1056 was supposed to fix it. Still failed with E0624: associated function tool_router is private. Diagnosis showed rmcp-macros 1.4.0 slipping in via caret on transitive dep despite our ~1.3 direct pin."
  detection_lag_days: ">60 (class-level blindness since repo went public); 0 (for this specific incident — caught same-day)"
  what_works_now: "T-1060 eliminated the macro-visibility dependency entirely (`vis = \"pub(crate)\"` makes the generated method reachable regardless of which rmcp-macros version resolves). This fix is resilient to future transitive drift in rmcp-macros."
  what_remains: "1. Add CI job that runs `cargo install --git .` (no --locked) on a clean worktree — catches this class of drift before users hit it. 2. Consider same CI for `cargo install` via crates.io when/if we publish there. 3. Audit other external-install paths (Homebrew formula, GitHub Releases binaries) for equivalent resolution surprises."
  mitigation_candidate: "Add .github/workflows/install-check.yml that on every push runs: rm -rf target && cargo install --git file://$PWD termlink --force (no --locked). Green means the external install path works against today's crates.io registry. Red means regression."
  status: decided-build
  decision_date: 2026-04-15
  decision: "T-1062 implemented .github/workflows/install-check.yml. Triggers on push + PR to main, runs `cargo install --git file://$GITHUB_WORKSPACE termlink --force` (no --locked), then smoke-tests `termlink --version`. Cargo registry cached but install dir is not (forces fresh build/resolve every run). Will close when the workflow has run green at least once on main."
  created: 2026-04-14
  last_reviewed: 2026-04-15
  related_tasks: [T-1056, T-1060, T-1062]

- id: G-006
  type: gap
  title: "Pre-push hook stamps project VERSION into vendored .agentic-framework/VERSION (overwrites framework's own version)"
  description: "The pre-push hook in .agentic-framework/agents/git/lib/hooks.sh:398-401 writes the project's git-derived version into BOTH /opt/termlink/VERSION (correct) AND /opt/termlink/.agentic-framework/VERSION (wrong). The vendored framework copy has its own VERSION file that should track which framework release was vendored — instead it gets overwritten on every push with the project's version. Observed 2026-04-15 during T-1061 housekeeping: .agentic-framework/VERSION was 1.5.587 at last vendor, became 0.9.872 (project version) after recent pushes. Upstream framework is at 1.5.624. The bug pre-dates G-001 fix (when .agentic-framework was a symlink, this code wrote into the framework source repo itself — equally wrong). After T-909 vendored the framework, the wrong-target write became visible in the project's git diff but the underlying logic was unchanged."
  spec_reference: ".agentic-framework/agents/git/lib/hooks.sh:385-403, T-606 (version-bumping-design.md), T-909 (vendor symlink fix)"
  severity: low
  trigger_fired: true
  trigger_event: "2026-04-15: T-1061 housekeeping inspected framework drift, found .agentic-framework/VERSION stamped to project version 0.9.872 instead of vendored framework version 1.5.x"
  detection_lag_days: ">7"
  what_works_now: "Project VERSION (root) stamps correctly. Framework operates regardless of its VERSION file value (it's metadata only — not loaded by any runtime code path; used by `fw upgrade` to compare vendored vs upstream). T-1061 reverted vendored VERSION to 1.5.587 manually."
  what_remains: "1. Fix hooks.sh to skip the .agentic-framework/VERSION write (or write the actual framework version, not the project's). 2. Verify `fw upgrade` works with restored value. 3. This is upstream framework work — file in /opt/999-Agentic-Engineering-Framework, not termlink."
  mitigation_candidate: "In hooks.sh, replace the write to .agentic-framework/VERSION with: do nothing (let `fw vendor` manage that file). Or: read the framework's actual version from the upstream source if available, otherwise leave the file unchanged."
  status: watching
  created: 2026-04-15
  last_reviewed: 2026-04-20
  related_tasks: [T-1061, T-606, T-909, T-1157, T-1358]
  notes:
  - 2026-04-20: Upstream pickup filed (P-T-1157) from termlink project; framework created T-1358 in their inception queue. Termlink-side task T-1157 closed with 4/4 verification. Waiting on framework to land the hooks.sh fix (delete 3 lines writing to .agentic-framework/VERSION).
  - 2026-04-22T19:07Z: Bug still present. Auto-handover commit 0c19bd6c (2026-04-22T18:59Z) ran pre-push audit which stamped both `VERSION` and `.agentic-framework/VERSION` to 0.9.303. Upstream fix (T-1358) remains unmerged. No termlink-side action available — keep watching.
  - 2026-04-24T10:45Z: Still present. `.agentic-framework/VERSION` now reads `0.9.398` (termlink version) vs. `.framework.yaml` pinned `1.5.16`. `fw doctor` flags `Version mismatch pinned=1.5.16 installed=0.9.398`. Upstream fix T-1358 still not landed — keep watching.

- id: G-007
  type: gap
  title: "OneDev → GitHub mirror is stuck — main branch pointer on GitHub is 25+ min stale despite successful pushes to OneDev"
  description: "CLAUDE.md's CI/Release Flow documents the chain: `git push origin` → OneDev → OneDev's PushRepository buildspec auto-mirrors to GitHub. Observed 2026-04-15: 7 commits (72bb5078..018a9801) pushed to OneDev successfully between 13:35Z and 15:30Z. At 15:45Z+, GitHub's `refs/heads/main` was still at 856306c7 (the commit immediately BEFORE the 7 new ones). The commits themselves exist on GitHub (reachable via the v0.9.1 tag which was pushed directly by `fw release`), but the branch pointer hasn't advanced. This means: (a) normal `git push origin main` flow is broken for new consumers who `git pull` from GitHub and expect fresh main, (b) the documented governance path (never push to GitHub) is circumvented only because `fw release` silently pushes to `github` remote directly, (c) GitHub Actions triggers that rely on `push: branches: main` (like the install-check workflow T-1062 just added) will NOT fire for recent commits until mirror catches up."
  spec_reference: "CLAUDE.md ## CI / Release Flow; OneDev PushRepository buildspec (.onedev-buildspec.yml); .agentic-framework/agents/git/lib/hooks.sh (fw release direct-github path)"
  severity: medium
  trigger_fired: true
  trigger_event: "2026-04-15: 7 commits pushed to origin (OneDev) between 13:35Z and 15:30Z; `gh api repos/.../commits/main` at 15:45Z still showed GH main HEAD=856306c7 (pre-session). The v0.9.1 tag at 4c8c9bb6 reached GH within seconds of `fw release` (direct push, not via mirror), confirming the auth/path to GH works — only the OneDev-side auto-mirror is stuck."
  detection_lag_days: 0
  what_works_now: "Tags and release artifacts arrive on GitHub via `fw release`'s direct push path. Commits reachable from tags are accessible on GH as dangling refs. OneDev-to-OneDev push is unaffected. The install-check workflow was added successfully (file is on GH via tag), it just won't fire from main-branch pushes until mirror catches up."
  what_remains: "1. Inspect OneDev's PushRepository buildspec job status (likely requires OneDev UI access — operator action). 2. Verify github-push-token is valid. 3. Check if OneDev mirror is rate-limited or queued. 4. Consider fallback: if mirror is chronically slow, document that `fw release` is the authoritative GitHub path and formalize its direct push, or run a reconciliation cron."
  mitigation_candidate: "Short-term: operator checks OneDev buildspec output for the failing mirror job. Medium-term (T-1140, IMPLEMENTED 2026-04-19): scripts/check-mirror-freshness.sh compares origin and GitHub HEADs on demand; exits 0 synced, 1 drift, 2 tooling error; supports --json/--quiet for cron integration. Long-term: decide whether the buildspec mirror is worth keeping vs. just pushing to both remotes from `git push` (simpler, no lag, no silent-stuck-mirror failure mode)."
  status: watching
  created: 2026-04-15
  last_reviewed: 2026-04-25
  last_observation: "2026-04-25T05:30Z: Mirror healthy. OneDev and GitHub both at c7466e35 (T-1218 [REVIEW] prereq evidence) — agent-only push to origin (no direct github push) propagated within seconds via the OneDev PushRepository job. Pre-push hook still pushes to both remotes when triggered, but agent-mode pushes (origin-only per memory rule) now confirm the mirror path works for the pure-OneDev case. Previous (2026-04-22T19:00Z): Mirror caught up after 7h lag. Pattern: intermittent stalls then self-resolves; no consistent reproducer."
  related_tasks: [T-1062, T-1140]

- id: G-009
  type: gap
  title: "Proxmox host (.180) /var/log full — cascades into LXC container reboot loop (CT 200 / ring20-management / .122)"
  description: "Proxmox host 192.168.10.180 has /var/log on a 224M zram0 filesystem at 100%. pveproxy access.log is 145M. CT 200 (ring20-management / .122) rebooted 5× in 5 hours on 2026-04-19 — each reboot regenerates the termlink hub TLS cert, triggering TOFU violations on clients. Observed 4 distinct cert fingerprints on .122 in >24h (cbc4 → b855 → 5198d1fb → b90adf2598), which trips the T-1053 auto-register threshold for hub rotation and matches the pattern class noted by the .122-side agent as PL-054/T-269 (framework-side). Root cause chain: proxmox /var/log fills → PVE host struggles → CTs get killed/restarted → hub starts fresh each time → clients fail to reach .122. The termlink side (T-1064 investigation, T-1028 persist-certs-on-restart) fixes the SYMPTOM on the container; the STRUCTURAL fix is logrotate on the proxmox host. Framework was blind to this for ≥24h — no cross-host disk-pressure check existed."
  spec_reference: "T-1064 (.109/.121/.122 hub outage investigation), T-1028 (persist TLS certs across hub restarts), T-1053 (auto-register rotation concerns), PL-054 / T-269 (framework-side pattern catalog)"
  severity: medium
  trigger_fired: true
  trigger_event: "2026-04-19 ~08:00Z: .122-side agent reported CT 200 rebooted 5× in 5h, pve host .180 /var/log at 100%, pveproxy access.log 145M of 224M zram0. 4th cert rotation on .122 observed same day (cbc4 → b855 → 5198d1fb → b90adf2598)."
  detection_lag_days: ">1 (pattern observed across multiple sessions before root cause reached proxmox host)"
  what_works_now: ".121 (ring20-dashboard) is stable and UP. Termlink client heal path (fleet reauth --bootstrap-from ssh:) works when SSH keys are installed. T-1028 hub cert-persist prevents rotation-on-restart IF the container stays up between restarts."
  what_remains: "1. Install logrotate on the proxmox host (180) for /var/log/pveproxy/access.log — rotate daily, keep 3, compressed. 2. Consider moving /var/log off zram to persistent storage on the pve host. 3. Add a framework cross-host disk-pressure check (fleet doctor could query 'df /var/log' via a per-host probe). 4. Harden hub-side cert persistence so container-reboot cycles don't invalidate client trust (T-1028 work)."
  mitigation_candidate: "Short-term: truncate access.log (operator, host-side SSH). Medium-term: logrotate config on .180. Long-term: cross-host health check that detects disk pressure before cascade."
  status: watching
  created: 2026-04-19
  last_reviewed: 2026-04-22
  observations:
    - date: 2026-04-22
      note: "Fleet-doctor from .107 shows ring20-management at 192.168.10.102:9100 unreachable ('No route to host' — network layer, not auth). TOFU pin for .102 last_seen 2026-04-21T13:15Z — hub was reachable yesterday. Possible G-009 cascade recurrence OR 5th container renumber (see ring20-management memory: 4 renumbers in 5 days as of 2026-04-20). Note: G-009's original title still references .122; the container has since renumbered through .102 and possibly beyond. Title drift — broaden 'CT 200 / ring20-management / <current-IP>' when refreshing."
    - date: 2026-04-22T18:48Z
      note: "Re-confirmed cascade still active. ICMP ping .102: 100% packet loss. Proxmox host .180 ITSELF is up (ping 0.117ms) with services :22, :80, :8006 (PVE UI), :9100 (Prometheus Node Exporter — confirmed by HTTP title tag). So cascade chain: .180 up → container CT 200 down at .102 → hub appears network-unreachable to fleet-doctor. Container is either rebooting, powered off, or 5th renumber. No change from earlier 2026-04-22 observation — still operator territory (logrotate on .180 + container revival)."
  related_tasks: [T-1064, T-1028, T-1053]

- id: G-008
