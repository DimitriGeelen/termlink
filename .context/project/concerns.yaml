  spec_reference: "P-010 completion gate, .agentic-framework/agents/task-create/update-task.sh, CLAUDE.md 'Verification Before Completion'"
  severity: medium
  trigger_fired: true
  trigger_event: "2026-04-22: T-976 Agent AC [x] claimed pl007-scanner.sh existed at `.agentic-framework/agents/context/pl007-scanner.sh` but the file was missing from repo and upstream framework. Discovered while batch-classifying stuck partial-complete tasks. Blast-radius audit on 2026-04-22 found a second case: T-977 (fw hook-enable command) Agent ACs [x] claim `bin/hook-enable.sh` exists and `fw hook-enable` route was added in bin/fw — neither exists (find returned empty; `fw --help` has only `fw hook <name>` dispatcher, no hook-enable route). Both false-completes originated in the same 2026-04-12 10:44–10:51Z build burst and reference each other (T-977 Agent AC [x] 'T-976 pl007-scanner registered via the new command' — a compound untruth)."
  detection_lag_days: "10 (T-976 closed 2026-04-12; gap observed 2026-04-22)"
  what_works_now: "## Verification section (P-011 gate) does run shell commands including `test -f` — when authors write them. T-976's Verification block DOES reference the scanner path but was not enforced at completion time (P-011 may have been added after T-976 shipped, or was bypassed). T-977's Verification block is empty (only the comment boilerplate). So the mechanism exists, just not retroactively applied or written."
  what_remains: "1. ✓ Build T-976 artifact honestly (T-1187 — pl007-scanner.sh landed in vendored copy; upstream mirror T-1188). 2. ✓ Build T-977 artifact honestly (T-1189 — hook-enable.sh + fw hook-enable dispatch landed in vendored copy; upstream mirror T-1190). Both work-completed 2026-04-22. 3. Consider a soft scanner that greps Agent AC bullets for file-path patterns (`.sh`, `.py`, `.rs`, `.toml`) and stats them at completion time — advisory, not blocking. Blast-radius audit shows 2 true hits out of 164 path-bearing [x] ACs (~1.2%); not systemic but not zero. Structural tooling fix deferred until a third independent false-complete triggers Level D."
  mitigation_candidate: "Both symptomatic false-completes now have build tasks AND upstream mirrors landed. T-1187 (pl007-scanner) + T-1188 upstream in framework master 25718851. T-1189 (fw hook-enable) + T-1190 upstream in framework master 684eea0c (hook-enable.sh) and c1b8ff05 (bin/fw dispatcher patch). Structural fix (soft scanner at completion time) still deferred — current evidence base (2 hits / 164 ACs) too narrow to justify tooling invest. G-015 remains watching to detect Hit #3+ class."
  status: watching
