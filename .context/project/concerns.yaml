  spec_reference: "Task frontmatter (.tasks/templates/zzz-default.md), cron registry (.context/cron), assumption tracker (.context/project/assumptions.yaml), CLAUDE.md inception discipline section. Closest existing primitives: horizon field (no date semantic), assumption validate/invalidate workflow (no date trigger), cron registry (no per-task hooks)."
