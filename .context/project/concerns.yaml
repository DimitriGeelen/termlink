- id: G-011
  type: gap
  title: "Local hub secret cache drift — ~/.termlink/secrets/<IP>.hex silently diverges from <runtime_dir>/hub.secret on hub restart"
  description: "When an agent is asked to share its local hub's secret with a peer (e.g., during heal-after-rotation), it reaches for the IP-keyed cache file at ~/.termlink/secrets/<hub-ip>.hex instead of the live authoritative file at <runtime_dir>/hub.secret. The cache is written once at heal time and never invalidated when the hub regenerates. Result: peers receive a stale secret that looks plausible (64-char hex, correct shape) but authenticates to nothing. Peer-side diagnosis points at the peer as the source of the mismatch, when the source is the giver's stale cache. Mirror-image of T-1051/T-933 (which address receiving-end drift after hub rotation) — this gap is giving-end drift."
  spec_reference: "T-1051 (hub auth reliability inception), T-933 (persist-if-present hub.secret), T-1028 (TLS cert persist), T-1052/T-1053 (auto-register learnings/concerns on auth-mismatch), CLAUDE.md §Hub Auth Rotation Protocol"
  severity: medium
  trigger_fired: true
  trigger_event: "2026-04-20 session: peer agent diagnosing a cross-hub auth mismatch found that /root/.termlink/secrets/192.168.10.121.hex (dated 2026-04-18 09:44) had diverged from /tmp/termlink-0/hub.secret after the hub restarted 2026-04-19 08:13. Peer had shared 79f4c6… from the stale cache; authoritative value was e4530da2…. Remote side was auth'ing cleanly; only the handoff was wrong. Resolved by cp-from-authoritative + chmod 600."
  detection_lag_days: "~1 day between hub restart and discovery"
  what_works_now: "1. Profiles like [hubs.local-test] that point secret_file directly at <runtime_dir>/hub.secret always see live state (no cache layer). 2. fleet doctor detects downstream symptoms (auth-mismatch on peer connection). 3. Tier-1 reauth printer (T-1054) gives operators the incantation once the problem is identified. 4. Tier-2 --bootstrap-from ssh: (T-1055) heals cleanly when SSH is available."
  what_remains: "1. Pre-handoff freshness check — when an agent reads ~/.termlink/secrets/<ip>.hex to share with a peer, warn if its mtime predates <runtime_dir>/hub.secret's mtime. 2. Deprecate IP-keyed cache for self-hub lookups in favor of direct reads from <runtime_dir>/hub.secret (profile-level: secret_file should point at the live file, not a copy). 3. fw doctor check comparing mtime of every ~/.termlink/secrets/*.hex entry against the corresponding hub's authoritative file (where locally resolvable). 4. Separately: audit file perms on ~/.termlink/secrets/*.hex — at least one file (proxmox4.hex) observed at chmod 644 (world-readable) which is a distinct security smell this gap surfaced."
  mitigation_candidate: "Short-term: document the 'read-live, not cache, for own hub' pattern in CLAUDE.md §Hub Auth Rotation Protocol. Medium-term: add fw doctor freshness/perms check. Long-term: structural deprecation of IP-keyed caches for same-host self-hub access; the authoritative <runtime_dir>/hub.secret becomes the canonical read path and IP-keyed caches are only for remote hubs where the operator has explicitly chosen to cache."
  status: watching
  created: 2026-04-20
  last_reviewed: 2026-04-20
  related_tasks: [T-1051, T-933, T-1028, T-1052, T-1053, T-1054, T-1055]

- id: G-012
  type: gap
  title: "fw fabric enrich does not detect edges for Rust sources — new crate files accumulate edgeless"
  description: "The Python-based fabric enricher (agents/fabric/enrich.py) fails to extract depends_on/depended_by edges from Rust source files. As of 2026-04-21, 19/104 fabric cards have zero edges on both directions — all are either (a) Rust files in the new T-1155 bus stack (termlink-bus crate + channel.rs, bus_client.rs, offline_queue.rs, etc.) or (b) non-Rust utility scripts (install.sh, watchdog.sh, transcripts-agent). Running `fw fabric enrich --dry-run` on any of them reports 0 edges added — the enricher is fundamentally blind to `use` / `mod` / `crate::` references. The audit warns '19/104 cards have no edges' every session; the suggested mitigation ('Run: fw fabric enrich') is a no-op for this class. The cards themselves were auto-created by `fw fabric register` with `subsystem: unknown` and `purpose: TODO` placeholders — purely structural, no semantic content. Blast-radius analysis for the bus stack is therefore incomplete: changing bus_client.rs does not light up impact on any downstream consumer because the edges don't exist."
  spec_reference: "agents/fabric/enrich.py, agents/fabric/fabric.sh, CLAUDE.md §Component Fabric, audit trend analysis (19-card warning recurring since T-1158 landed)"
  severity: low
  trigger_fired: true
  trigger_event: "2026-04-21 session: after closing T-1173, investigated the recurring 19-edgeless-card audit warning. `fw fabric enrich --dry-run` against all 104 cards: 0 enriched, 0 edges added. Against one specific bus-stack card (bus_client.rs) same result. Cards have the shape `subsystem: unknown, purpose: TODO, depends_on: [], depended_by: []` — pure skeletons from auto-registration."
  detection_lag_days: "~3 days (T-1158 landed 2026-04-18; 19-card warning recurring in audit trend analysis since but never root-caused until now)"
  what_works_now: "1. Registration itself works — `fw fabric register <path>` creates the card file. 2. Non-Rust files that reference each other via calls (shell scripts calling shell scripts) ARE enriched — see agents/mesh/agent-wrapper.sh with 3 edges. 3. `fw fabric drift` correctly reports 'unregistered: 0' — registration coverage is fine; only edge detection is broken."
  what_remains: "1. Teach enrich.py to parse Rust `use` and `mod` statements — extract (a) crate-external dependencies (e.g., `use termlink_bus::Bus`) and (b) intra-crate module references. 2. For cards with `purpose: TODO`, consider refusing to commit them or auto-suggesting a purpose from the file's module docstring. 3. Lower the audit threshold or change the warning to distinguish 'no edges because enricher failed' from 'no edges because genuinely leaf utility'. 4. Consider: a framework-side task to author purposes + edges for the 19 current edgeless cards as a one-time backfill (cheaper than fixing the enricher if the codebase stabilises)."
  mitigation_candidate: "Short-term: operators and agents ignore the warning for this class; use `cargo tree` + direct code reading for Rust blast-radius instead. Medium-term: framework-side task to add Rust parsing to enrich.py (regex-based first pass: `use \\w+(::\\w+)+` → extract crate paths). Long-term: replace the Python enricher with a language-server-based one that uses rust-analyzer / tree-sitter for accurate dependency extraction."
  status: closed
  resolution: "Fixed in T-1175 (2026-04-21): added `detect_rust_deps` to enrich.py covering `mod <name>;` (sibling file resolution) and `use <crate>::` (workspace crate resolution via underscore→hyphen convention). Dry run added 260 edges (130 forward + 130 reverse) across 83 cards. Edgeless count dropped 19 → 4 (remaining 4 are genuinely standalone shell scripts with no fabric peers). Audit now reports `[PASS] Fabric edges: 100/104 cards enriched`. Long-term rust-analyzer/tree-sitter path still sensible when the regex approach shows limits."
  created: 2026-04-21
  last_reviewed: 2026-04-21
  closed: 2026-04-21
  related_tasks: [T-1158, T-1159, T-1160, T-1161, T-1175]

