- id: PL-111
  learning: Hub-side state that needs to survive restart belongs in runtime_dir alongside T-1294's secret/cert — and the bus
    registry already does, contrary to the T-1444 inception's original premise. Topics + retention are persisted to SQLite
    at `<runtime_dir>/bus/meta.db` (crates/termlink-bus/src/lib.rs:38-92). The `RwLock<HashMap<String, ...>>` referenced in
    earlier diagnoses is the runtime cache (`appenders` log handles + `notifiers` tokio Notify primitives), NOT the registry.
    Observed topic loss after hub binary swaps is therefore a runtime_dir-volatility issue (same root cause as T-1294 secret/cert
    loss on /tmp/termlink-0), not an in-memory-only registry. T-1443 `--ensure-topic` remains useful as an idempotent client-side
    shortcut so callers don't have to track which canon topics need pre-creation. Don't conflate 'hub running + canary SHAs
    unchanged' with 'hub state intact' — runtime_dir durability is the load-bearing invariant; verify <runtime_dir>/bus/meta.db
    is on durable storage.
  source: T-1443
