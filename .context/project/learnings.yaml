- id: PL-202
  learning: "Cycle-12 MCP help-registry shape-expansion pattern (T-1984..T-2000, 8 slices, 70 invariant tests, 0 failed). When extending an MCP tool registry with new paged/ranked/filtered/projected dimensions, each slice repeats a deterministic 7-step recipe (1) ADD opt-in `Option<T>` param to the Params struct with a doc comment naming the slice T-ID, (2) GROW `build_help_json` signature by one arg (Option<&T> at the end), (3) BULK-PATCH all callers (~100+) via a Python depth-tracking script that finds each matching close-paren and inserts `, None` immediately before it — DO NOT use a regex with non-greedy paren skip, it breaks on nested `Some(...)` calls (T-1984 burned 30min on this), (4) WIRE production caller (`p.field.as_deref()`), (5) APPLY in name_filter AND T-1997 bulk-flat-listing branches only (other modes left alone), (6) EMIT envelope `*_applied` (recognized input) and `*_unknown` (silently-dropped input) — the input-validation pattern that lets LLM clients catch mis-typed param values, (7) ADD drift-table tokens + macro-doc paragraph + 7-11 invariant tests covering: bare trigger, composition with prior axes, backcompat-when-unset, registry-order tiebreak. SHIPPED AXES: limit (T-1984), offset (T-1994), parameter_required_count row signal (T-1995), sort_by (T-1996), bulk-flat-listing routing for no-needle paging (T-1997), fields projection (T-1998), categories array positive multi-scope (T-1999), exclude_categories array negative multi-scope (T-2000). CANONICAL COLD-START CALL: `termlink_help(sort_by='required_arity', limit=20, exclude_deprecated=True, categories=['channel','agent_chat'], exclude_categories=['agent_inbox'], fields=['name','parameter_required_count'])` returns ~20 rows ~1.5KB ranked-paged-projected; pre-arc the no-arg call dumped ~50KB. BACKCOMPAT INVARIANT: every slice must keep envelope shape unchanged when the new param is unset — verified by existing tests staying green at each slice (764→771→778→785→796→804→815→825→834 across the 8 commits). The pattern generalizes to any tool-registry MCP server that wants LLM-friendly paged-ranked discovery. WHEN TO STOP: at ~17 args the HelpParams struct is at the ergonomic ceiling — further axes have diminishing returns; capture-as-pattern (this entry) and natural pause is appropriate."
