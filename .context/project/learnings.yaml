- id: PL-201
  learning: "DIAGNOSTIC GOTCHA: do NOT use log-file mtime as a liveness signal for presence-heartbeat (or any cron that just calls `termlink channel post`). On 0.11.473+ `termlink channel post` is SILENT on success — exits 0 with no stdout/stderr. `>> /var/log/x.log 2>&1` with empty stream does not bump mtime, so a perfectly-healthy presence cron can show `/var/log/presence-heartbeat.log` mtime stuck for hours/days while the listener is in fact LIVE on the hub. Burned cycles in T-1990 chasing a false-alarm 'cron stopped firing' on .122 — mtime was 24h stale but cron syslog confirmed every-minute firing and `agent-listeners.sh --filter-agent-id ring20-management-agent` showed LIVE with age_secs=18. AUTHORITATIVE LIVENESS CHECK: `bash scripts/agent-listeners.sh --hub <addr>:9100 --filter-agent-id <agent_id> --include-offline --json` and read `.listeners[0].status==\"LIVE\"` + `.age_secs < 90`. NOT log mtime, NOT log content presence (a healthy presence-heartbeat log is expected to be empty). If you want a structural signal in the LOG itself, add `echo \"$TS: ok\"` to the script after the post — but the listener-LIVE check is the same source of truth as the system uses internally, so log breadcrumbs are redundant ceremony. Same caveat applies to dm-poller in the no-new-envelopes case (dm-poller currently DOES print 'no new envelopes' per cycle so its mtime stays fresh, but if that ever changes the same trap reopens)."
  source: P-002
  task: T-1990
  date: 2026-06-05
  context: Discovered while investigating presumed regression on T-1985's .122 presence-heartbeat cron; mtime stuck 24h made it look broken but listener was healthy throughout
