- id: PL-171
  learning: 'PL-171: Fine-grained PAT ''Workflows'' permission is required to push refs touching .github/workflows/* — even
    for branch updates whose direct diff doesn''t change workflow files. Classic PATs with ''repo'' scope grant this implicitly;
    fine-grained PATs need ''Workflows: Read and write'' added separately to Contents permission. GitHub''s failure surfaces
    as HTTP 401 fast-fail on git push (~1s runtime), NOT a clear ''workflow scope required'' error. Only the FIRST workflow-touching
    ref attempted produces the clear error message — earlier refs in a multi-ref push are silently rejected. Diagnostic that
    exposes it: try pushing tags individually; the workflow-affecting one returns ''refusing to allow a Personal Access Token
    to create or update workflow ... without workflow scope''. Source: T-1695 (G-058) — 21 days of mirror failures, 4 PAT
    rotations, eventually exposed by attempting v0.1.1 tag push which referenced workflow file changes in its commit ancestry.'
  source: P-001
