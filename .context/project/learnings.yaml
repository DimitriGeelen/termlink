- id: PL-146
  learning: 'PL-146: TermLink CLI cron-env runtime_dir resolution gotcha. Cron environments inherit no TERMLINK_RUNTIME_DIR.
    The CLI default is /tmp/termlink-<uid>/hub.sock — but vendored hubs commonly run elsewhere (/root/.termlink/runtime, /var/lib/termlink,
    watchdog-managed paths). When the per-uid /tmp socket is missing, channel post --hub <local-implicit> queues forever as
    ''hub unreachable'' and the heartbeat appears to fire (cron logs each invocation) while no posts land. Diagnostic: ''env
    -i PATH=... HOME=... vendored-arc-heartbeat.sh'' reproduces the cron-env failure, vs interactive shell which inherits
    TERMLINK_RUNTIME_DIR from .profile. Fix in scripts/vendored-arc-heartbeat.sh (commit fb95f06d): probe for default /tmp/termlink-<uid>
    socket; if absent and $HOME/.termlink/runtime/hub.sock exists, export TERMLINK_RUNTIME_DIR before posting. Forward-compat:
    any script that talks to the LOCAL hub from cron should either set TERMLINK_RUNTIME_DIR explicitly in the cron entry or
    apply the same probe-and-export pattern.'
