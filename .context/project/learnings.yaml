- id: PL-198
  learning: "MCP/CLI envelope convergence pattern: when MCP tool returns bare hub-RPC result and the corresponding CLI command wraps via wrap_ok or {ok:true, ...result-spread}, MCP misses the envelope. Fix: mirror CLI's spread-merge in MCP (let mut wrapped = json!({\"ok\": true}); for (k,v) in result.as_object() { wrapped[k] = v.clone(); }). Find candidates: grep 'to_string_pretty(&result).unwrap_or_else(json_err)' in tools.rs, then check CLI side for wrap_ok or manual spread. Converged this arc: list_sessions T-1918, discover T-1919, status T-1921, clean T-1922, kv_list T-1924, event_poll T-1925. Remaining: event_subscribe (CLI does custom first-event flattening, different fix), kv_watch (no CLI equivalent, convention-only), channel_create (both bare, two-sided fix needed)."
