- id: PL-145
  learning: 'WSL /mnt/c filesystem mount produces non-deterministic segfaults on static-pie ELF binaries when concurrent execve
    happens against the same path. Symptom on .141 (laptop-141, WSL2): /mnt/c/ntb-acd-plugin/termlink/target/release/termlink
    segfaults on --version when invoked while the hub is also using the same binary. Identical md5sum of /tmp copy runs cleanly.
    Root cause: 9p mount text-file-busy semantics differ from native ext4. Fix: copy binary to a Linux-native path (~/bin/,
    /usr/local/bin/, /opt/) and PATH-prepend to override; do NOT rely on /mnt/c-mounted binaries for cron-driven invocations
    on WSL hosts. Also: /tmp wipes on WSL restart so symlinks targeting /tmp are not durable; use $HOME/bin for user-space
    durability without sudo.'
