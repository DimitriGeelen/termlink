- id: PL-166
  learning: 'Envelope `from_fingerprint` on a shared host identifies the HOST, not the agent. On .107 all co-resident agents
    (penelope, cohort-agent, framework-agent, termlink-agent, this Claude session) sign envelopes with one host-wide ed25519
    key (d1993c2c). Payload-level fingerprints (e.g. 9219671e treated as ''Pen''s'' for 6+ weeks) are advisory labels only
    — never identity claims. T-1427 binds envelope.sender_id to the actual signing pubkey; if your matcher tries to claim
    a different sender_id, T-1427 rejects with error -32014. Operational rule: matchers that key on envelope.from_fingerprint
    to distinguish co-resident agents are matching the host and therefore vacuous. To genuinely distinguish, either (a) ship
    per-agent signing keys (T-1693 inception filed) or (b) rely on payload-layer disambiguation primitives (T-1448 inception).
    G-056 watches this gap.'
  source: T-1693
  task: T-1693
  date: 2026-05-18
  context: cohort-agent operator-relay letter, T-1427 enforcement empirical evidence
  application: 'When designing or debugging co-resident matchers: never claim envelope.from_fingerprint distinguishes one
    Claude session from another on the same host. Use payload-layer fields or wait for T-1693 to ship per-agent keys.'
- id: PL-167
  learning: 'MCP tool wrappers may silently hide protocol-level fields. envelope.metadata is on the TermLink wire (proven
    by chat-arc:350) but termlink_channel_post doesn''t accept a metadata parameter, so every MCP caller emits envelope.metadata
    = {}. Symptom looks like a protocol gap; the gap is at the tool surface. Generalizes: any time an MCP tool wraps a protocol
    verb, the tool schema is the constraint, not the protocol. Verification rule: when investigating why feature X ''doesn''t
    work over MCP'', check (1) does the protocol carry X (raw RPC trace), (2) does the MCP tool schema expose X as a parameter
    — gaps in (2) are common and recoverable as additive schema changes; gaps in (1) need protocol-level work. G-057 watches
    this class; T-1692 fixes the channel_post instance.'
  source: T-1692
  task: T-1692
  date: 2026-05-18
  context: cohort-agent operator-relay letter, chat-arc:350 wire evidence
  application: When a peer reports a 'protocol gap' affecting MCP callers, first audit the tool schema before reaching for
    protocol changes. Use chat-arc:350 as the canonical example of populated wire metadata when explaining to others.
- id: PL-168
  learning: 'Canary scripts without a trigger are not prevention — they are dormant tooling. T-1140 shipped scripts/check-mirror-freshness.sh
    in 2026 to detect OneDev→GitHub mirror drift, but the task closed without installing a cron, so the canary never fired
    automatically. Result: G-058 — 16-day silent mirror failure (2026-05-02 → 2026-05-18) hiding 3 missed release tags (v0.10.0,
    v0.11.0, v0.11.1) and broken Homebrew install. The script correctly detected the drift on smoke-test at the END of the
    incident, which proves the failure was wiring, not logic. Generalizes: any Level-C tooling fix (write the detector) has
    a Level-D requirement (wire it to a trigger — cron, hook, CI job, pre-push). Closing the Level-C task without checking
    ''how does this fire next time?'' leaves a script-shaped placebo that gives false sense of safety. Verification rule:
    every detector task must have a Verification command of the form ''crontab -l | grep <script>'' or equivalent — if the
    schedule isn''t enforced by the gate, the next breakage runs unnoticed for N days, where N is bounded only by how long
    it takes someone to look.'
  source: T-1696
  task: T-1696
  date: 2026-05-18
  context: G-058 incident — 16-day silent mirror failure where T-1140's existing canary script correctly detected the drift
    on manual run but had never been scheduled.
  application: When closing a detector/canary/audit task, add a Verification command that proves the trigger is active (cron
    entry exists, hook installed, CI job registered). Do not accept 'manually invocable' as a complete task; the manual path
    is for debugging, the automated path is the actual prevention.
- id: PL-169
  learning: 'Human-AC over-deferral: ACs whose success criterion is mechanically verifiable do NOT belong under ### Human
    just because they describe wording/output. The framework hard-blocks agent-tick on Human ACs (T-1731 hook), so misclassifying
    a mechanical check creates dead weight — open ACs that can''t auto-close, false ''awaiting review'' signals in metrics,
    operator overhead to rubber-stamp re-runs of commands the agent has already executed. Discipline: an AC belongs under
    ### Human iff it requires (a) UI rendered to a human''s eyes, (b) a human-authenticated session the agent cannot obtain
    (GitHub.com PAT mint, Cloudron admin), or (c) a genuine subjective judgment call (tone, aesthetic, architectural taste).
    If the Steps are ''run command X, observe field Y'', it belongs under ### Agent with the success criterion spelled out
    as a string-match or structural assertion. Tagging an AC `[REVIEW]` does not make it Human-AC-worthy — [REVIEW] is for
    prioritization within Human ACs that genuinely belong there. Observed instances: T-1480 (offline error wording ''operator-actionable''
    — names FP/window/last_seen are string-matches) and T-1481 (text-mode output ''readable + actionable'' — fields-present
    + columns-aligned are structural-checks). Both ACs were sound success criteria misplaced under ### Human; both moved to
    ### Agent at close. Pattern probably exists in older tasks too — audit candidate.'
  source: T-1480
  task: T-1481
  date: 2026-05-18
  context: Operator question 'why do we need human to verify?' after agent ran the commands and presented evidence — surfaced
    the structural over-deferral pattern.
  application: 'When filing a task with Human ACs, ask: ''can I write a concrete pass/fail criterion using only commands or
    string-matches?'' If yes, the AC belongs under ### Agent. Reserve ### Human for things that genuinely require human-only
    access or subjective judgment. When reviewing an old task with an unticked Human AC that turns out to be mechanically
    verifiable, move it to ### Agent (not tick it under Human — that''s framework-blocked by T-1731). Optional follow-up:
    audit existing tasks with stale Human ACs to surface other instances of this pattern.'
- id: PL-170
  learning: 'Detector alerts trigger blocker-re-evaluation. When the framework''s audit/detector fires on a long-stale asset
    (e.g. 15d heartbeat staleness alert), the agent should re-check the ''this is blocked because X'' claim in any human-owned
    task related to that asset BEFORE proposing operator action. Constraints documented at task-create time can resolve silently
    (a session gets registered, a host becomes reachable, a binary gets vendored). T-1455 was filed 2026-05-03 with ''agent
    has no termlink session on .121'' as the blocker; by 2026-05-18 session tl-qe2pao72 was ready — the blocker had been gone
    for some unknown number of days. Pattern: alert fires → agent investigates → constraint check reveals it changed → migrate
    Human ACs per PL-169 → execute. Distinct from PL-169 (which addresses misclassification at filing time) — this addresses
    staleness over time.'
  source: P-002
