- id: PL-199
  learning: "Parity harness pattern: mixing sync subprocess I/O with tokio::spawn in #[tokio::test] requires multi_thread runtime flavor. Default current_thread blocks the runtime when the test calls Command::output(), so spawned accept_loop tasks never run and the subprocess times out on socket roundtrip. Symptom: test passes for in-memory MCP path (tokio::io::duplex) but times out for CLI-subprocess path. Fix: #[tokio::test(flavor = \"multi_thread\", worker_threads = 2)]. Affects parity_ping, parity_status; hub-less parity tests don't need it. Root cause masked T-1909's correctness ignore reason for 1 day. Source: T-1911."
