- id: PL-175
  learning: 'PL-175: Runtime signature alone — a job stuck/hung with no error output — is NOT sufficient to form an RCA hypothesis when the system has two failure modes that produce identical runtime signatures. T-1695 burned ~2 hours diagnosing OneDev → GitHub mirror failure as "PAT missing Workflows scope" → "cache issue" → "v2 PAT" → "permission edit" → "regenerate", all on a problem that did not exist at the OneDev auth layer. Actual root cause: executor mismatch (`penelope-shell` executor on a build node that couldn''t satisfy it), visible only in the OneDev UI build log line `10:32:17 Pending resource allocation...`. The REST API had no log endpoint, so without UI access there was no diagnostic. Rule: when REST API has no log endpoint AND runtime signature alone is the only signal, INSIST on UI logs (or equivalent structured trace) BEFORE forming hypotheses. Wrong hypotheses are cheap to form and expensive to disprove — a single 30s glance at the UI build log would have collapsed 2 hours of theory-chasing. Apply: any time you''re forming an RCA hypothesis from "job is stuck, no error" alone, ask "what build/job log am I missing access to?" first.'
  source: P-001
  task: T-1695
  date: 2026-05-20
  context: Added via T-1724 from T-1695 RCA retrospective
  application: 'Any agent diagnosing a stuck/hung remote job (CI, build queue, dispatch, mirror sync) where the only signal is "no output, no error": stop, demand UI log access (or operator-paste of the log), and form hypotheses only AFTER reading the log. Do NOT chain auth/permission/credential theories from runtime signature alone.'
- id: PL-176
  learning: "TermLink has NO inter-hub channel-topic federation primitive. Channel topics with the same name on different hubs are independent state (verified T-1791: grep across termlink-hub + termlink-protocol for federat/peer_subscribe/cross_hub/topic_replic returns 0 matches). The 1800 vs 486 chat-arc disparity between .107 and .122 (2026-05-21) is the DESIGN, not a bug. Apparent 'DM federation' was cohort-agent manually cross-posting via `remote_call channel.post`, not a federation primitive. Cross-hub coordination is CLIENT-DRIVEN: use --hub <addr> or `remote_call channel.post` explicitly. Diagnostic recipe: `termlink channel list --json` on each hub, compare counts per shared topic; look for cross-posting patterns in envelope sender_ids. Filing this learning revised on 2026-05-21 after T-1791 inception spike (original framing said DM federation worked vs chat-arc didn't — both wrong; neither auto-federates)."
  source: P-001
  task: T-1166
  date: 2026-05-21
  revised: 2026-05-21
  context: Filed during cohort diagnostic loop; revised after T-1791 inception spike (docs/reports/T-1791-g060-chat-arc-federation-inception.md)
  application: "When investigating a 'topic out of sync across hubs' symptom, first verify whether the topic should auto-federate AT ALL (it shouldn't — see above). Compare counts per shared topic; check sender_ids for cross-posting patterns; do not assume federation as the default explanation."
