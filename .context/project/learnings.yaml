    hub start'' → displaces running hub → triggers secret rotation. Observed 502/1440 false-positive ticks (35%) in one day,
    ~143 successful displacements, 3 real rotations (08:53/10:58/14:02). Each rotation invalidates every peer''s cached hex+TLS
    — exactly the symptom class in T-1051, G-011, G-016, T-149, T-494. Recommended fix: ''pgrep -f ^termlink hub start &&
    test -S /tmp/termlink-0/hub.sock'' — process+socket check is false-positive-resistant.'
