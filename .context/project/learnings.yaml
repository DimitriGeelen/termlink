- id: PL-205
  learning: "Pre-commit hook fail-open on non-executable scanners. Original symptom: vendored .agentic-framework/agents/git/lib/*.sh shipped -rw-r--r-- (no exec bit); the hook's [ ! -x SCANNER ] test triggered an exit 0 'fail open' path with the message 'secret-scan: scanner not found (skipping)'. Net effect: T-1844 secret-scan + T-1863 dup-task-scan + T-1845 large-file gate were silently disabled for the lifetime of any non-exec vendor copy. T-2061 RESOLVED this structurally in upstream commits 00d81b2b2 + 3e94344c5 (origin/master, agentic-engineering-framework, 2026-06-08): pre-commit hook now gates on -f (file existence) instead of -x, AND invokes via `bash \"$SCANNER\" scan-staged` so the exec bit is irrelevant for both the gate AND the invocation. Smoking-gun signal in old-hook output: the line 'secret-scan: scanner not found at <path> (skipping)' followed by no further scanner messages (dup-task-scan and large-file-scan silently no-op'd). Recovery on a stale consumer until they pull the upstream + run `fw git install-hooks`: chmod +x .agentic-framework/agents/git/lib/{secret,dup-task,large-file}-scan.sh."
