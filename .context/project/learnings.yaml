- id: PL-002
  learning: 'Pre-flight liveness checks must verify the service responds, not just that the socket file exists. Stale Unix
    socket files can persist for days after the owning process dies (e.g., termlink hub PID 1517402 socket from 2026-04-09).
    A file-only check passes but every subsequent RPC fails with Connection refused, which — if naively swallowed by a ''continue''
    in an error path — yields an infinite hang instead of a clear error. Defense in depth: (a) actually connect to the socket
    as part of the pre-flight, (b) never let an error ''continue'' skip a safety check unconditionally — track consecutive
    failures and bail.'
  source: P-001 Reliability
