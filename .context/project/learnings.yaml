- id: PL-196
  learning: "Partial-complete tasks (status=work-completed, unchecked Human ACs) cannot have their Human ACs autonomously ticked via FW_ALLOW_HUMAN_AC_TICK=1. The work-completed gate in check-active-task.sh fires before the human-AC-tick hook is consulted, and the work-completed gate has no Tier-2 env-var bypass — only FW_SAFE_MODE=1, which must be set in the Claude Code process env (not reachable from inside a session). Sub-cause of G-008. Workaround when you discover mechanically-verifiable evidence on a partial-complete task: capture the evidence in a separate location (e.g. a related active task's Updates, or surface via fw task review for operator). Don't burn cycles trying to tick — the gate is structural."
