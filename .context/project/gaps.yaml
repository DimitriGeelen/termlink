# Gaps Register — Spec-Reality gaps with decision triggers
# Status: watching | decided-build | decided-simplify | decided-defer | closed
gaps:
  - id: G-001
    title: "Command injection in spawn — arbitrary code execution via RPC"
    severity: critical
    directive: D2-Reliability
    status: closed
    discovered: "2026-03-10"
    discovered_by: "T-063 reflection fleet (security agent)"
    closed: "2026-03-11"
    closed_by: "T-077, T-078, T-084, T-086, T-087, T-088, T-090"
    evidence: "executor.rs:21-22 passes user-controlled strings directly to sh -c with no escaping, validation, or allowlisting. Any process connecting to the Unix socket can execute arbitrary commands as the process owner."
    resolution: "Defense-in-depth via 4 layers: (1) UID peer credentials reject cross-user connections (T-077), (2) command.execute requires Execute scope — highest tier (T-078/T-084), (3) capability tokens require explicit HMAC-signed authorization (T-086/T-087/T-088), (4) optional command prefix allowlist restricts WHAT can be executed (T-090). The sh -c pattern is intentional for a command execution endpoint; the security model ensures only authorized callers can invoke it."
    impact: "Local privilege escalation. Any rogue process on the same machine can execute arbitrary shell commands through TermLink's RPC interface."
    related_tasks: [T-064, T-008, T-077, T-078, T-084, T-086, T-087, T-088, T-090]
    report: "docs/reports/reflection-result-security.md"
    trigger_check:
      type: auto
      check: "grep -c 'sh.*-c' $PROJECT_ROOT/crates/termlink-session/src/executor.rs"
      threshold: ">= 1"
      description: "Fires while executor.rs still passes unescaped input to sh -c"

  - id: G-002
    title: "No authentication on Unix sockets — any local process can impersonate sessions"
    severity: critical
    directive: D2-Reliability
    status: closed
    discovered: "2026-03-10"
    discovered_by: "T-063 reflection fleet (security agent)"
    closed: "2026-03-11"
    closed_by: "T-077, T-078, T-084, T-086, T-087, T-088"
    evidence: "CommonParams.sender is extracted but never validated. Auth error codes (AUTH_REQUIRED, AUTH_DENIED) are defined in control.rs:40-41 but never used by any handler. Socket permissions (0o700) are the only trust boundary."
    resolution: "Three-phase security model: Phase 1 (T-077) UID peer credentials, Phase 2 (T-078/T-084) per-method permission scoping with AUTH_DENIED, Phase 3 (T-086/T-087/T-088) HMAC-SHA256 capability tokens with auth.token RPC method."
    impact: "Session impersonation. Any process running as the same user can send events, execute commands, and inject input as any session. No audit trail of who did what."
    related_tasks: [T-008, T-077, T-078, T-084, T-086, T-087, T-088]
    report: "docs/reports/reflection-result-security.md"
    trigger_check:
      type: auto
      check: "grep -c 'AUTH_REQUIRED\\|AUTH_DENIED' $PROJECT_ROOT/crates/termlink-session/src/handler.rs"
      threshold: ">= 1"
      description: "Closes when handler.rs actually uses auth error codes"

  - id: G-003
    title: "Watcher emits false task.completed on Claude crash — silent failure"
    severity: high
    directive: D1-Antifragility
    status: closed
    discovered: "2026-03-10"
    discovered_by: "T-063 reflection fleet (watcher-pattern agent)"
    closed: "2026-03-11"
    closed_by: "T-091"
    evidence: "specialist-watcher.sh and role-watcher.sh emit task.completed unconditionally after claude -p returns. The || echo swallows non-zero exits. Orchestrator sees success even when specialist crashed."
    resolution: "Both watchers already have exit-code-aware logic. specialist-watcher.sh (lines 71-87) and role-watcher.sh (lines 99-115) capture CLAUDE_EXIT via || CLAUDE_EXIT=$?, check exit code, and emit task.failed with exit_code on non-zero. The original gap evidence was based on an earlier version of the scripts. The trigger check was too coarse (grep for string presence, not conditional logic)."
    impact: "Anti-antifragile — the system hides failures instead of learning from them. Orchestrators make decisions based on results that don't exist. Scales the broken pattern to N agents."
    related_tasks: [T-065, T-091]
    report: "docs/reports/reflection-result-watcher.md"
    trigger_check:
      type: auto
      check: "grep -c 'CLAUDE_EXIT' $PROJECT_ROOT/tests/e2e/specialist-watcher.sh"
      threshold: ">= 1"
      description: "Confirms exit-code-aware logic is present in watcher scripts."

  - id: G-004
    title: "Hub is a CLI subcommand — single point of failure for multi-agent coordination"
    severity: high
    directive: D2-Reliability
    status: closed
    discovered: "2026-03-10"
    discovered_by: "T-063 reflection fleet (enhancement agent)"
    closed: "2026-03-10"
    closed_by: "T-080, T-081, T-082"
    evidence: "Hub is a subcommand in the CLI binary with no persistence, no state recovery, no supervision. When the terminal closes, all coordination stops. No heartbeat, no auto-deregistration of dead sessions."
    resolution: "Hub now has pidfile lifecycle (T-080), graceful shutdown with SIGTERM/connection drain (T-081), and active session supervision loop at 30s intervals (T-082). CLI supports hub start/stop/status subcommands."
    impact: "TermLink has crossed from CLI tool to infrastructure (10 agents depend on it for coordination). A CLI-embedded hub cannot provide infrastructure-grade reliability."
    related_tasks: [T-066, T-080, T-081, T-082]
    report: "docs/reports/reflection-result-enhance.md"
    trigger_check:
      type: manual
      description: "Closes when hub is extracted to a proper daemon with pidfile and supervision"

  - id: G-005
    title: "Pure conversation sessions bypass all framework enforcement"
    severity: medium
    directive: D1-Antifragility
    status: watching
    discovered: "2026-03-11"
    discovered_by: "T-094 (5-agent investigation)"
    evidence: "Claude Code fires zero hooks for pure conversation sessions — no PreToolUse, no PostToolUse, no SessionEnd. The task gate, commit cadence enforcement, and session capture checklist only trigger on tool use. A session that never touches a file can run indefinitely and lose all content on context exhaustion."
    impact: "Research and exploration conversations — often the most valuable sessions — are silently ephemeral. No structural backstop exists. Agent self-governance is the only mitigation."
    mitigation: "C-002 Exploratory Conversation Guard (CLAUDE.md rule): stop at 3 substantive exchanges, create inception task, invoke /capture. /capture skill (T-108) provides the save mechanism."
    related_tasks: [T-094, T-095, T-108]
    report: "docs/reports/T-094-volatile-conversation-prevention.md"
    trigger_check:
      type: manual
      description: "Closes if Anthropic adds PostMessage or SessionEnd hooks to Claude Code (T-099 PR request)"

  - id: G-006
    title: "CTL-008 pre-push audit false-positives after rebase onto branches with external commits"
    severity: medium
    directive: D2-Reliability
    status: watching
    discovered: "2026-03-22"
    discovered_by: "T-228 RCA investigation"
    evidence: "CTL-008 checks `git log --oneline -20` for T-XXX prefix ratio. After rebasing onto origin/main with CI/release commits that lack task refs (e.g., GitHub Actions workflow fixes), the check counts those external commits against the local project's traceability ratio. With 17 CI commits and 10 local commits, ratio drops to 65% (FAIL threshold: 80%). This blocks push even though all local commits are properly traced."
    impact: "Any rebase onto a branch with external commits (CI, bot, cross-repo) blocks push. Workaround requires --no-verify which bypasses ALL audit checks, not just the broken one. This creates a perverse incentive to skip the entire audit."
    mitigation: "Documented. Current workaround: `git push --no-verify` after manual audit review."
    related_tasks: [T-228]
    trigger_check:
      type: auto
      check: "grep -c 'git.*log.*--oneline.*-20' /usr/local/opt/agentic-fw/libexec/agents/audit/audit.sh"
      threshold: ">= 1"
      description: "Fires while audit.sh uses fixed last-20 window instead of origin..HEAD scope"

  - id: G-007
    title: "Task ID counter not safe for concurrent/divergent work — sequential collision"
    severity: medium
    directive: D2-Reliability
    status: watching
    discovered: "2026-03-22"
    discovered_by: "T-229 RCA investigation"
    evidence: "create-task.sh reads highest T-XXX from .tasks/ and increments. When two sessions diverge (e.g., local + remote CI), both start from the same ID. After merge, IDs collide. Required 3 rounds of renumbering (T-205→T-215→T-222) as remote kept creating new tasks."
    impact: "Task references in commits become ambiguous. Episodic summaries, fabric cards, and audit findings may reference wrong task. Manual renumbering is error-prone and creates churn."
    mitigation: "Renumbered local tasks to T-222–T-229. Documented for upstream framework report."
    related_tasks: [T-229]
    trigger_check:
      type: manual
      description: "Closes when task ID allocation uses distributed-safe mechanism (ULID, session prefix, or range reservation)"
