# MCP-tool task_id enforcement baseline
# T-1646 (Arc C drift defense from T-1641)
# Source of truth for orchestrator-mcp-scan.sh
#
# Categories:
#   gated            — MUST call check_task_governance() — mutators that already do
#   mutators_ungated — Mutators with side effects that SHOULD gate but currently don't (ratchet target)
#   readonly_exempt  — Passive/read-only tools — gating optional
#
# Drift detection rules:
#   1. Any tool listed under `gated` losing its check_task_governance call → FAIL
#   2. Any tool in `mutators_ungated` GAINING a check_task_governance call → CONGRATS, move it to `gated` and update baseline (ratchet)
#   3. New tool not in any list → WARN, requires manual classification
#   4. `gated` count must not drop below baseline_count
#
# Source code reference: /opt/termlink/crates/termlink-mcp/src/tools.rs
# Provenance: snapshot 2026-05-01 from T-1641 W03 + this scan.
# Update 2026-05-06 (T-1755): added 59 termlink_agent_* tools (chat/threads/reactions
# primitives) classified by naming convention (action verb → mutator; read suffix → readonly).
# /opt/termlink is outside PROJECT_ROOT and unreadable from here, so handler-level
# verification is deferred — human can correct miscategorisations on review.
# Update 2026-05-06 (T-1760): added 18 more termlink_agent_* analytics primitives
# (stats/rates/depths/volumes — all read-shaped names). Same convention-based
# classification rule. Baseline 136 → 154.
# Update 2026-05-15 (T-1867): added 14 more termlink_agent_* analytics primitives
# (presence/streaks/silences/top-N — all read-shaped names). Same convention-based
# classification rule. Baseline 154 → 168.
# Update 2026-05-28 (T-2073): added 74 more tools spanning termlink_agent_*,
# termlink_channel_*, termlink_fleet_*, termlink_hub_*, termlink_tofu_*.
# 14 mutators (action-verb names: channel_ack/edit/forward/pin/poll_start/poll_end/
# poll_vote/quote/react/redact/reply/star/typing_emit; fleet_reauth) classified
# to mutators_ungated. 60 read-shape tools (analytics, snapshots, threads, members,
# probes, verifications) to readonly_exempt. Same convention-based classification;
# handler-level verification deferred (/opt/termlink outside PROJECT_ROOT, strict
# path isolation). Baseline 168 → 242.
# Update 2026-05-28 (T-2073 follow-on): re-run revealed 4 additional listener/
# auto-discover primitives (cadence issue — same one T-1761 inception captured).
# agent_send_auto_discover → mutator (verb "send"); listener_heartbeat /
# agent_listeners / agent_listeners_fleet → readonly (status/list shapes).
# Baseline 242 → 246.
# Update 2026-05-31 (T-2150): 5 more primitives surfaced — chat_arc / fleet_doorbell
# / fleet_adoption / recent_dm primitives. 1 mutator (chat_arc_broadcast — action verb
# "broadcast" → sends a message to all subscribers) + 4 readonly (chat_arc_recent /
# check_fleet_doorbell_mail_health / fleet_adoption_snapshot / recent_dm — all read-
# shape suffixes). Same convention-based classification; handler-level review deferred.
# Baseline 246 → 251. T-2150 Evolution captures 5th-batch cadence as updated evidence
# for T-1761 inception (the marginal-leverage assumption is increasingly tenuous).
# Update 2026-06-01 (T-2154 — T-1761 GO build slice): convention auto-classification
# now lives in agents/audit/orchestrator-mcp-scan.sh (classify_by_convention). When
# new termlink_agent_* / termlink_channel_* tools appear, the convention partitions
# them into mutators_ungated (action-verb suffix) or readonly_exempt (read-shape
# suffix) automatically. Default mode emits findings.auto_classified as advisory;
# --apply rewrites this file in-place (with .bak backup) and bumps baseline_count.
# Verb whitelist canonical: post, send, broadcast, edit, react, pin, quote, redact,
# reply, star, typing_emit, ack, forward, poll_start, poll_end, poll_vote, reauth.
# Tools outside the two namespaces still require manual classification (bounded
# blast radius per T-1761 §Implementation shapes line 89).

# Update 2026-06-09 (T-2154): convention auto-classification applied via --apply. +5 mutators, +7 readonly. Baseline 251 → 263. T-1761 verb whitelist canonical (see orchestrator-mcp-scan.sh classify_by_convention).
# Update 2026-06-24 (T-2278): baseline restored into termlink (was missing — T-1646
# fixture never landed here). Reconciled vs current tools.rs: +2 mutators
# (channel_set_retention, channel_sweep — convention mis-filed these as readonly;
# corrected on review per header invariant), +7 readonly (channel_cv_keys + 6
# out-of-namespace read/status/history verbs: fleet/hub governor, substrate, whoami).
# Baseline 263 -> 272.
baseline_count: 272
