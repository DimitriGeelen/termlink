# Cron Registry — Structured source of truth for scheduled jobs (T-448)
# Read by web/blueprints/cron.py and fw cron generate.
# Editable by humans, controllable via Watchtower web UI.
#
# Each job has: id, name, schedule, command, source_file, origin_task, status, description
# status: active | paused
# Populated from live /etc/cron.d/agentic-audit-termlink (T-936)

jobs:
  - id: structural-30m
    name: "Structural audits (30 min)"
    schedule: "*/30 * * * *"
    command: "fw audit --section structure,compliance,quality,discovery --cron"
    source_file: agentic-audit-termlink
    origin_task: T-184
    status: active
    description: "Checks task quality, project structure integrity, compliance, and discovery patterns every 30 minutes."

  - id: traceability-hourly
    name: "Git traceability + episodic (hourly)"
    schedule: "0 * * * *"
    command: "fw audit --section traceability,episodic,discovery-trends --cron"
    source_file: agentic-audit-termlink
    origin_task: T-184
    status: active
    description: "Verifies git commit traceability, episodic memory completeness, and discovers trends hourly."

  - id: observations-6h
    name: "Observations + gaps (6 hourly)"
    schedule: "0 */6 * * *"
    command: "fw audit --section observations,gaps --cron"
    source_file: agentic-audit-termlink
    origin_task: T-184
    status: active
    description: "Reviews observation inbox and gaps register every 6 hours."

  - id: oe-fast-30m
    name: "OE fast checks (30 min)"
    schedule: "15,45 * * * *"
    command: "fw audit --section oe-fast,oe-research --cron"
    source_file: agentic-audit-termlink
    origin_task: T-196
    status: active
    description: "Operational effectiveness fast checks and research controls every 30 minutes (offset from structural)."

  - id: oe-hourly
    name: "OE hourly checks"
    schedule: "30 * * * *"
    command: "fw audit --section oe-hourly --cron"
    source_file: agentic-audit-termlink
    origin_task: T-196
    status: active
    description: "Operational effectiveness hourly control checks (CTL-008, CTL-020)."

  - id: oe-daily
    name: "OE daily checks"
    schedule: "0 7 * * *"
    command: "fw audit --section oe-daily --cron"
    source_file: agentic-audit-termlink
    origin_task: T-196
    status: active
    description: "Daily operational effectiveness audit covering most controls at 7am."

  - id: oe-weekly
    name: "OE weekly checks"
    schedule: "0 9 * * 1"
    command: "fw audit --section oe-weekly --cron"
    source_file: agentic-audit-termlink
    origin_task: T-196
    status: active
    description: "Weekly operational effectiveness audit (CTL-016) on Monday at 9am."

  - id: full-daily
    name: "Full audit (daily)"
    schedule: "0 8 * * *"
    command: "fw audit --cron"
    source_file: agentic-audit-termlink
    origin_task: T-184
    status: active
    description: "Complete audit of all sections, runs daily at 8am."

  - id: docs-daily
    name: "Component docs regeneration (daily)"
    schedule: "15 8 * * *"
    command: "fw docs --all"
    source_file: agentic-audit-termlink
    origin_task: T-387
    status: active
    description: "Regenerates component reference documentation daily at 8:15am."

  - id: retention-daily
    name: "Cron audit file retention (daily)"
    schedule: "0 9 * * *"
    command: "find .context/audits/cron -name '*.yaml' -mtime +7 -delete"
    source_file: agentic-audit-termlink
    origin_task: T-602
    status: active
    description: "Prunes cron audit files older than 7 days to prevent disk bloat."

  - id: pickup-process
    name: "Pickup inbox processor (15 min)"
    schedule: "*/15 * * * *"
    command: "fw pickup process"
    source_file: agentic-audit-termlink
    origin_task: T-921
    status: active
    description: "Scans pickup inbox for cross-project proposals, validates, dedup-checks, and creates inception tasks."
