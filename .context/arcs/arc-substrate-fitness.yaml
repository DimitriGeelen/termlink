proposed_scoped_drivers:     # PROPOSALS from HANDOFF-termlink-remediation-2026-06-22 (claude-primary). NOT approved.
  - name: AS_COORDINATION_TRUTH
    rationale: "Discriminates tasks that make the coordination picture factually correct (live, not stale; no silent loss) from tasks that only make coordination cheaper or faster. D2 Reliability reads as uptime; this reads as accuracy-of-state."
    poles: "5 = R4 (governance plane never silently loses a 'complete'); 0 = R7/R1 (cheaper/faster, same truthfulness). [re-anchored 2026-06-22 — original R3 anchor dropped per Q4=NO]"
    suggested_weight: 6
    suggested_at: 2026-06-22T00:00:00Z
    suggested_by: claude-primary
  - name: AS_FAILURE_OBSERVABILITY
    rationale: "Discriminates tasks that make a previously-silent failure visible/recordable from tasks that reduce failure frequency or cost. Orthogonal to D2 — a task can reduce failures without making them observable (R2) or make them observable without reducing them (R5)."
    poles: "5 = R4 (silent discard becomes a durable dead-letter); 0 = R2 (fewer messages, no new visibility)."
    suggested_weight: 5
    suggested_at: 2026-06-22T00:00:00Z
    suggested_by: claude-primary
  - name: AS_RESOURCE_FOOTPRINT
    rationale: "Discriminates tasks that reduce the substrate's traffic/storage footprint from tasks that are footprint-neutral or footprint-ADDING. Creates deliberate tension with AS_FAILURE_OBSERVABILITY (telemetry adds footprint while improving observability) — exactly the within-arc discrimination arc-scoped drivers are for."
    poles: "5 = R2/R7 (bounds a monotonic growth source); 0 = R5 (adds a durable telemetry store)."
    suggested_weight: 4
    suggested_at: 2026-06-22T00:00:00Z
    suggested_by: claude-primary
