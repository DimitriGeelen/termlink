payload:
  summary: "Hub should scan multiple session dirs — eliminates runtime dir split-brain"
  detail: "## Context
The termlink hub runs with TERMLINK_RUNTIME_DIR=/var/lib/termlink (persistent, survives reboots). Sessions spawned interactively or by scripts default to /tmp/termlink-0. This creates a split-brain where the hub cannot route to sessions in the other dir. Remote callers see only hub-pool sessions.

The immediate fix (T-940 E1) was to unify TERMLINK_RUNTIME_DIR system-wide. This works but is fragile — any process that doesn't inherit the env var creates sessions in the wrong pool.

## Proposal
Modify the hub's session scanner in the termlink-hub Rust crate to accept multiple --sessions-dir paths, or auto-discover session dirs. E.g.:

  termlink hub start --tcp 0.0.0.0:9100 --sessions-dir /var/lib/termlink/sessions --sessions-dir /tmp/termlink-0/sessions

Or: the hub scans a well-known list of dirs (TERMLINK_RUNTIME_DIR + /tmp/termlink-$UID) by default.

## Value
- Eliminates the split-brain permanently without env var coordination
- Persistent sessions can live in /var/lib (survive reboots)
- Ephemeral sessions can stay in /tmp (auto-cleaned)
- Remote callers see ALL sessions regardless of where they registered

## Priority
Low — E1 (env unification) is sufficient for now. This is the long-term architectural fix.

## Source
T-940 RCA on .107, 2026-04-12. Five iterations of runtime-dir debugging before arriving at the env-based workaround."
  priority: low
  tags: [termlink-hub, rust, session-discovery, multi-dir]
