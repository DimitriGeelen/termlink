- Live reproduction: this session 2026-06-11T10:00-12:30 CEST
- Pattern: PL-NEW candidate — "historical system-reminders parsed as
  current state" (likely affects more than budget; same shape could hit
  any cached JSON: .focus.yaml, .restart-requested, etc.)

