# Decisions (from task file Decisions section)
decisions:
    chose: "Push the skill markdown to all reachable hosts FIRST, even though the binary doesn't yet support `agent contact` on .122/.141."
    rationale: "Skill file is inert content (markdown). On stale binary, `termlink agent contact` returns \"unknown subcommand\" which the skill's fail-fast rule surfaces cleanly. So the skill is harmless. Forward-deploying the doc artifact is cheap (1 base64 round-trip) and means the moment the binary lands, the verb is already wrapped. Reverse order would mean a window where the binary supports `agent contact` but no skill exists to wrap it — same wait, but with worse symmetry."
    alternatives_rejected: ["\"Binary first, then skill\" — costs more bg time, leaves field agents staring at a verb without a skill. Higher operator burden during the gap."]
    alternatives_rejected: ["\"Atomic both via fleet-deploy-binary.sh\" — PL-100 deferred this, T-1423 `--probe` not yet shipped. One-at-a-time rollout reduces blast radius."]

