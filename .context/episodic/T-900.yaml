# T-900: Fix agent_ask timeout return to use structured JSON

**Completed:** 2026-04-05
**Type:** build
**Duration:** 2026-04-05 (same day, ~5 min)

## What Was Done
Fixed the last plain-text return path found during the T-894/T-895/T-896 JSON standardization sweep. The `agent_ask` timeout path was using `format!()` to return a plain string; replaced with `json_err()`. Also replaced hand-crafted JSON strings in `dispatch_status` with proper `json_err()`/`to_string_pretty()` calls. All 881 tests pass with zero clippy warnings.

## Key Decisions
- No significant alternatives; final cleanup of the standardization sweep.

## Patterns Observed
- Stragglers found after a sweep are common; the initial pass (T-894-T-896) caught most tools but `agent_ask` timeout and `dispatch_status` were in a different code path and were missed until a second pass.

## Artifacts
- Modified: agent_ask timeout handler (format! -> json_err)
- Modified: dispatch_status JSON construction (hand-crafted strings -> json_err/to_string_pretty)
