summary: >
  Built tl-dispatch.sh, a shell script that spawns claude -p workers in real TermLink terminal sessions. Each worker gets its own Terminal.app window with an isolated environment. The script supports spawn, status, wait (single or --all), result retrieval, and cleanup subcommands. Worker completion is signaled via TermLink events on the worker.done topic.

