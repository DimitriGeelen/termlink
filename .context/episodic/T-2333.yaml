# Decisions (from task file Decisions section)
decisions:
  - decision: '2026-07-03 — reqwest crypto-provider pin (ring vs aws-lc-rs)'
    chose: 'reqwest feature `rustls-tls-webpki-roots-no-provider` instead of the plain `rustls-tls`.'
    rationale: 'the hub''s TLS stack deliberately uses rustls''s aws-lc-rs backend (Cargo.toml line 54). Plain `rustls-tls` transitively enables `__rustls-ring`, so BOTH aws-lc-rs and ring provider features end up compiled into the shared rustls dep. rustls 0.23 then refuses to auto-select a process-default provider and panics ("make sure exactly one of the ''aws-lc-rs'' and ''ring'' features is enabled") whenever a TLS config is built without an explicit provider — this broke the 4 `tls::tests`. The regression was latent since Slice-1 (T-2332) because that slice only ran `cargo test -p termlink-hub webhook`, never the full suite. The `-no-provider` variant keeps the bundled Mozilla webpki roots (portable HTTPS validation, Directive 4 — no OS trust store) WITHOUT enabling ring, leaving aws-lc-rs the sole provider so auto-default works again.'
    alternatives_rejected: ['(a) calling `CryptoProvider::install_default()` at hub startup — doesn''t help the unit tests, which build TLS configs directly outside the startup path; (b) `native-roots` — needs the OS trust store, less portable than bundled webpki roots.']
  - decision: '2026-07-03 — topic filter matching semantics'
    chose: 'exact topic membership OR the `"*"` wildcard; empty `topics` list never fires.'
    rationale: 'deny-by-default symmetry with the Slice-1 host allowlist — a target only fires for topics it explicitly subscribes to. No prefix/substring matching keeps the rule un-surprising and audit-clear.'
    alternatives_rejected: ['prefix matching (`work-*`) — deferred; adds glob-parse surface with no demand yet.']

