# T-895: Standardize remaining MCP tool outputs to structured JSON

**Completed:** 2026-04-05
**Type:** refactor
**Duration:** 2026-04-05 (same day, ~5 min)

## What Was Done
Continuation of T-894. Converted MCP tools `termlink_signal`, `termlink_emit`, `termlink_emit_to`, `termlink_broadcast`, and `termlink_tag` from plain text returns to structured JSON. Each tool now returns an `ok` field plus tool-specific data (e.g., signal/pid for signal, topic/seq for emit, target/topic/seq for emit_to, targeted/succeeded/failed counts for broadcast, target/tags/roles for tag). Updated integration tests for emit, tag_add, and tag_set_remove.

## Key Decisions
- No significant alternatives; mechanical application of the JSON standardization pattern established in T-894.

## Patterns Observed
- Batch standardization pattern: once the first tool (T-894) established the JSON structure convention, subsequent tools followed the same template rapidly.

## Artifacts
- Modified: MCP tool handlers for signal, emit, emit_to, broadcast, tag
- Modified: Integration tests for emit and tag operations
