summary: |
  scope ack-with-retry client helper build (T-2285 Design A GO follow-up). ack_retry module — durable AwaitingAckTracker + exactly-once retry loop (Design A core). wire channel post --await-ack/--retry CLI verb to ack_retry helper. document ack-with-retry — recipient auto-ack convention + sender recipe + ADR cross-ref. tick ACs + record decisions (layering, two-halves test, schema) + fabric card

# Key outcomes
outcomes:
  - 'A durable **awaiting-ack tracker** persists the post identity + attempts to a SQLite store, reusing the T-2051 `outbound.sqlite` conventions (single-writer `Mutex<Connection>`, `TERMLINK_IDENTITY_DIR`-aware path); a confirmed ack deletes the row. — `AwaitingAckTracker` in `crates/termlink-session/src/ack_retry.rs` (schema `awaiting_ack(dm_topic, msg_offset, client_msg_id UNIQUE, recipient_sender_id, attempts, enqueued_ms)`; `record`/`bump_attempts`/`confirm`/`get`/`list`). See Decisions re: schema refinement.'
  - 'An `await_ack_with_retry` helper in `termlink-session` posts with a **stable** `client_msg_id`, polls the receipt frontier until the recipient''s `up_to >= offset` OR the deadline, and on deadline **re-posts the SAME `client_msg_id`** (≤ `max_attempts`) — relying on T-2049 dedupe for exactly-once. — `ack_retry::await_ack_with_retry` (generic over post/receipts/clock closures) + `await_ack_with_retry_realtime` wrapper.'
  - 'CLI verb surface `channel post --await-ack [--retry] [--ack-timeout-secs N] [--max-attempts N]` wires the helper; **without** `--await-ack` the post path is byte-for-byte unchanged (backward compatible — await-ack is a separate early-return branch). — `cli.rs` flags (with `requires = "await_ack"`, verified live), `main.rs` dispatch, `run_await_ack` in `channel.rs`.'
  - 'A test proves retry-after-dead-recipient is exactly-once: the recipient withholds its ack until after ≥1 retry; asserts (a) exactly **one** append across both attempts (dedupe absorbs the retry), (b) the helper returns success once `up_to >= offset`. — `ack_retry::tests::retry_after_dead_recipient_is_exactly_once` (sender half) complements hub-side `dedupe_with_client_msg_id_duplicate_returns_cached_offset` (hub half). See Decisions re: two-halves strategy.'
  - 'The **recipient auto-ack convention** is documented for the AEF harness — `docs/operations/substrate-ack-with-retry.md` § "Recipient half" + substrate ADR §6 #5 cross-reference, explicitly flagged as the AEF-layer responsibility.'
  - 'Retry-policy defaults align with AEF §6 heartbeat numbers (poll cadence ~5s, deadline ~30s, 3 attempts; documented tunable via `--ack-timeout-secs`/`--max-attempts`). — `RetryPolicy::default()` + `from_operator` + `from_operator_clamps_and_defaults` test.'

