# Decisions (from task file Decisions section)
decisions:
  - decision: '2026-06-26 — Orchestration logic lives in termlink-session, generic over closures'
    chose: 'Put both the durable tracker AND the `await_ack_with_retry` loop in `termlink-session`, with the loop generic over injected `post_fn` / `receipts_fn` / clock / sleep closures. The CLI (`run_await_ack`) supplies real closures wrapping `rpc_call_authed`.'
    rationale: 'The exactly-once invariant becomes provable with **zero hub scaffolding** — a fake `post_fn` that simulates T-2049 dedupe + a fake clock the `sleep_fn` advances make the retry test instant and deterministic. Keeps the receipts-RPC plumbing (CLI-layer) out of the helper.'
    alternatives_rejected: ['Putting the loop in `termlink-cli` (couldn''t unit-test without a live hub) and a hub-side enforced-redelivery design (Design B — makes the hub delivery-stateful; rejected at inception for blast radius).']
  - decision: '2026-06-26 — Exactly-once proven in two halves, not one live-hub integration test'
    chose: 'Prove the hub dedupe leg via the existing `termlink-hub` test (`dedupe_with_client_msg_id_duplicate_returns_cached_offset`) and the sender reuse leg via `ack_retry::tests::retry_after_dead_recipient_is_exactly_once` (dedupe-honouring fake hub).'
    rationale: 'The full chain is covered without standing up an in-process hub that implements BOTH dedupe AND `channel.receipts` (neither existing test harness does both). Each half is sharp and fast.'
    alternatives_rejected: ['Extending the `FakeHub` in `bus_client_integration.rs` to implement dedupe + receipts — more scaffolding for no additional coverage, since the hub dedupe is already independently tested.']
  - decision: '2026-06-26 — Tracker schema refinement vs the literal AC'
    chose: 'Persist `(dm_topic, msg_offset, client_msg_id, recipient_sender_id, attempts, enqueued_ms)` rather than the AC''s literal `retry_deadline_ms`.'
    rationale: 'The per-attempt deadline is a transient computed from `now + deadline_ms` inside the loop — persisting it would be stale on reload. `recipient_sender_id` (whose ack we await) is the genuinely useful durable field for a recovery sweep. Tracker durability + confirm-on-ack semantics (the AC''s substance) are fully met.'

