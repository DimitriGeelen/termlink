  WS-S3b live CLI push consumer — channel subscribe --push (WS-connect + degrade-to-poll); ws_consumer session module; live smoke green (arc-004)

# Key outcomes
outcomes:
  - '`termlink-session` gains a `ws_consumer` module with a helper that, given a `TransportAddr` (TCP), an auth token, and a topic list, connects TCP+TLS (unsplit `TlsStream` via new `Client::connect_tls_stream`), upgrades via `tokio_tungstenite::client_async`, sends `hub.auth` + `hub.ws_subscribe`, and forwards each `hub.event` `params` value into an `mpsc::Sender`. Returns cleanly (Ok/Err) when the socket closes or errors. `cargo build -p termlink-session` succeeds; 4 unit tests (`ws_auth_request_shape`, `ws_subscribe_request_shape`, `ws_hub_event_mapping`, `ws_auth_ack_ok_detection`) cover frame construction + the `hub.event`→forward mapping. **All 4 pass.**'
  - '`channel subscribe` gains a `--push` flag (clap, `cli.rs`) threaded through the dispatch (`main.rs`, both call sites) into `cmd_channel_subscribe`. `termlink channel subscribe --help` lists `--push` (verified). `cargo build --release -p termlink` succeeds.'
  - 'With `--push` against a remote hub target, the handler mints a token via the existing remote-auth path (`mint_tcp_hub_token` reusing `resolve_hub_secret_hex` + `auth::create_token`, same logic as `rpc_call_authed`) and streams pushed events live from the WS helper''s channel, rendering each readably — `[push] <topic> seq=<n>: <payload>` in human mode, the raw `params` JSON line under `--json`. If the WS path errors at any stage (unix target, connect, TLS, handshake, auth) OR the stream ends, it prints a one-line stderr degrade notice (`[push] WS … — degrading to poll`) and falls through to the existing poll loop — never a hard failure (degrade-to-poll invariant).'
  - 'End-to-end smoke against a live hub (isolated test hub on `127.0.0.1:9199`, fresh binary): `channel subscribe inbox.queued --push --follow` received the doorbell **the instant** a `channel post inbox:smoke` landed — `[push] inbox.queued seq=0: {"channel":"inbox:smoke","message_offset":0,...}` — no poll tick. Evidence in Updates below. *(Smoke uses `inbox.queued`, not an arbitrary topic — see Evolution: the WS carries aggregator-injected events, and only `inbox:*` posts inject one. This is the arc''s live-DM-doorbell path, exactly what S4 verified.)*'
  - 'No regression: `cargo test -p termlink-session` green (WS additions isolated); the release CLI builds; the poll path (`--follow` without `--push`) is unchanged (the `--push` branch runs *before* the untouched poll loop and only when the flag is set).'

