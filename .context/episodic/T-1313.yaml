# Decisions (from task file Decisions section)
decisions:
    chose: "`metadata.in_reply_to=<offset>` as a routing-hint string, NOT included in `canonical_sign_bytes`."
    rationale: "Follows the T-1287 metadata pattern (conversation_id, event_type are also unsigned routing hints) and keeps the change Tier-A — empty metadata → wire shape unchanged for legacy senders. Trusted-mesh threat model already accepts unsigned metadata; making a single Matrix-style rel-type signed would have forced a versioned canonical layout for one field."
    alternatives_rejected: ["Adding `reply_to: Option<{topic, offset}>` as a new top-level signed field. Pros: cryptographically anchored; cons: requires conditional canonical layout, breaks any path that hashes the raw envelope. If the threat model later demands signed thread parents, revisit as a separate `reply_to` field with explicit canonical-version bump."]
    chose: "Single integer (decimal string in metadata) within the same topic."
    rationale: "All Matrix-equivalent use cases fit a single topic — agent conversations happen on a single channel. Cross-topic replies are rare and can be modeled as new posts that reference both topics in payload."
    alternatives_rejected: ["`<topic>:<offset>` to enable cross-topic threading. Pros: more general; cons: adds parsing complexity to every consumer + filter and we have zero current use cases."]

