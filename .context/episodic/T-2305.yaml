outcomes:
  - 'A WebSocket dependency (`tokio-tungstenite`, TLS-feature-free since the WS runs over the already-TLS-terminated stream) is added to the hub crate''s `Cargo.toml`, and `cargo build --release -p termlink-hub` succeeds. *(server.rs / Cargo.toml — release build green.)*'
  - 'The hub accept path detects an inbound HTTP WebSocket upgrade (first-byte sniff `G` of `GET ` vs `{` of a JSON-RPC line, replayed via `PeekedStream` so no byte is lost) and completes the RFC6455 handshake via `tokio_tungstenite::accept_async`, yielding a WS stream over the same generic `AsyncRead+AsyncWrite` connection type used today. *(Test drives a real `client_async` upgrade to completion.)*'
  - 'Back-compat: a connection that speaks the existing newline-delimited JSON-RPC line protocol (first byte `{`) is routed to `handle_line_connection` — the extracted-verbatim old body — so the plain path is unchanged. Proven by all 373 hub unit tests + 4 integration tests still passing.'
  - 'The upgraded WS connection is authenticated by **reusing** the existing HMAC scope-verification path: `hub.auth` flows through the *same* `process_request_message` dispatch as the line transport, so an invalid/absent token yields the identical refusal (unauthenticated calls → `AUTH_REQUIRED -32009`; a bad `hub.auth` does not authenticate and does not drop the socket), and a valid token caches the authenticated scope (`granted_scope`) for the connection lifetime — no new/forked auth scheme.'
  - 'A unit test (`server::tests::ws_upgrade_auth_and_reuse`) exercises both outcomes over a real WS client: (a) valid token authenticates and the connection stays open for a subsequent authed call that returns a result; (b) unauthenticated call rejected with `AUTH_REQUIRED` and an invalid token fails to authenticate. Passes in CI.'

