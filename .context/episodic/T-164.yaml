summary: >
  Closed the TCP auth bypass identified in T-163 research. Hub now generates a token_secret on startup and writes it to hub.secret (mode 600). TCP connections default to zero scope with only hub.auth allowed. After successful token authentication, connections are upgraded to appropriate scope levels. Unix socket connections retain same-UID full access. Added hub-specific method scope mapping and new tests for auth rejection and post-auth access.

