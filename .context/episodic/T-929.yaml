# T-929: termlink kv --target — fifth rollout

**Completed:** 2026-04-11
**Type:** build
**Duration:** 2026-04-11 (same day, ~3 min)

## What Was Done
Fifth per-command rollout of `--target`. Added four cross-host routing flags to `termlink kv`. Collapsed four hand-rolled `client::rpc_call + timeout + json_error_exit` branches (get/set/list/del) into a local `call()` helper that routes through `call_session`. Scopes per action: kv.get and kv.list use observe, kv.set and kv.delete use interact. All output formats preserved (text, --json, --raw, --keys). Removed now-unused `use termlink_session::client;` import.

## Key Decisions
None -- followed T-925 pattern. The boilerplate collapse was a natural cleanup.

## Patterns Observed
- The kv command had the most hand-rolled boilerplate (4 branches x ~25 lines each). The shared helper eliminated significant duplication beyond just adding cross-host support.

## Artifacts
- Modified: `crates/termlink-cli/src/cli.rs` (Kv variant)
- Modified: `crates/termlink-cli/src/commands/metadata.rs` (cmd_kv routing, removed unused import)
