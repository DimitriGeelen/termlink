# Key outcomes
outcomes:
  - 'A push-waker (`scripts/be-reachable-pushwaker.sh`) holds `termlink channel subscribe inbox.queued --push`, parses each frame, and on a frame whose `addressee_session_id` equals the configured inbox id fires `termlink inject <pty_session> "<doorbell-text>" --enter`; frames for other addressees are ignored (no false wake). — demo: positive ring 172 ms, negative filtered (no false wake)'
  - 'The waker dedupes per `(addressee, message_offset)` within a short TTL so a single deposit rings at most once; cross-rail double-wake (push + sender ring) is bounded by `/check-arc respond` idempotency and documented in the script header. — `pushwaker_dedup_ok` unit-tested (dup within ttl skips; after ttl rings)'
  - '`be-reachable.sh start` spawns the waker detached (nohup setsid) when a `pty_session` is resolved, records its pid as `pushwaker_pid` in the state file, and does NOT spawn it when `pty_session` is empty (nothing to ring). — wired in cmd_start + state file'
  - '`be-reachable.sh stop` terminates the `pushwaker_pid` (SIGTERM then KILL fallback) alongside the heartbeat pid; `status` surfaces the waker pid and its alive state. — wired in cmd_stop + cmd_status'
  - 'On WS drop the waker relies on the `--push` built-in active reconnect (T-2314) and the sender/poll path remains the durability floor — no change to the durable inbox / receipts / journal (WS is trigger-only). — no hub/durability code touched (bash-only)'
  - 'A pure filter/dedup unit test (`scripts/test-pushwaker-filter.sh`) covers: frame-matches-self → ring; frame-for-other → skip; duplicate offset → skip. — 8/8 checks PASS'
  - 'A loopback demo (`scripts/demo-pushwaker.sh`, isolated hub + HOME) proves: a deposit to `inbox:<id>` rings the PTY sub-second via push, and a non-matching deposit does NOT ring; report line `RESULT: PASS`. — RESULT: PASS (172 ms)'

