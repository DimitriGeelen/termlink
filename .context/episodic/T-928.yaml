# T-928: termlink tag --target — fourth rollout

**Completed:** 2026-04-11
**Type:** build
**Duration:** 2026-04-11 (same day, ~3 min)

## What Was Done
Fourth per-command rollout of `--target`. Added four cross-host routing flags to `termlink tag`. Slightly more complex than previous rollouts because `cmd_tag` issues two different RPCs depending on mode: read mode calls `termlink.ping` (observe scope) to display tags/roles/display_name, write mode calls `session.update` (interact scope) for mutations. Both paths routed through `call_session`. All existing output formats (text + JSON) preserved.

## Key Decisions
None -- followed T-925 pattern. The dual-RPC routing was straightforward since `call_session` + `default_scope_for` already handled both methods.

## Patterns Observed
None.

## Artifacts
- Modified: `crates/termlink-cli/src/cli.rs` (Tag variant)
- Modified: `crates/termlink-cli/src/commands/metadata.rs` (cmd_tag routing)
