# T-894: Standardize MCP termlink_spawn output to structured JSON

**Completed:** 2026-04-05
**Type:** refactor
**Duration:** 2026-04-05 (same day, ~7 min)

## What Was Done
Converted `termlink_spawn` from plain text `format!()` strings to structured JSON output with `ok`, `session_name`, and `status` fields. Also standardized `kv_set`, `kv_get`, and `kv_del` to return structured JSON with `ok` field. Updated integration tests for the new JSON output format. Spawn failure paths now use `json_err()` for consistent error formatting.

## Key Decisions
- No significant alternatives considered; this was a mechanical standardization applying the same pattern across spawn and KV tools.

## Patterns Observed
- First task in a multi-task standardization sweep (T-894, T-895, T-896, T-900) converting all MCP tool outputs from plain text to structured JSON.
- Small, focused refactor tasks complete quickly when the pattern is well-defined.

## Artifacts
- Modified: MCP tool handler for spawn and KV operations
- Modified: Integration tests for new JSON output format
