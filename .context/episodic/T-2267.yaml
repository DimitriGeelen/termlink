# Decisions (from task file Decisions section)
decisions:
  - decision: '2026-06-24 — claim-lifecycle scope split (Interact vs Control)'
    chose: '`channel.claim`/`renew`/`release` → **Interact**; `channel.transfer_claim`/`force_release` → **Control**.'
    rationale: 'claim/renew/release mutate only the caller''s OWN lease (self-scoped, low blast radius) — symmetric with `channel.post` appending one''s own message. transfer_claim and force_release reassign or override ANOTHER worker''s ownership, so they warrant the higher Control tier. Mirrors the audit recommendation.'
    alternatives_rejected: ['Putting all claim-lifecycle at Control (my pre-audit AC draft) — would force ordinary workers to hold Control just to manage their own work units, defeating the least-privilege intent.']
  - decision: '2026-06-24 — fix scope at hub_method_scope, keep deny-by-default'
    chose: 'Add explicit arms to `hub_method_scope` (server.rs); leave the `_ => auth::method_scope` → `_ => Execute` deny-by-default intact.'
    rationale: 'Genuinely unknown/future methods should still fail closed. The bug was never the default — it was that the known `channel.*` surface was never enumerated. Explicit classification preserves the security property while fixing the honest-caller breakage.'
    alternatives_rejected: ['Flipping the catch-all to Observe — would silently expose any new method at the lowest tier.']

