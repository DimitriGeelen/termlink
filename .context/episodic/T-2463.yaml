summary: |
  add Bus::gap_before(topic, subscriber_id) — LOUD detection of a subscriber whose persisted cursor fell behind the retention window, closing the silent message-loss gap at the bus layer (round-16 F2)

# Key outcomes
outcomes:
  - '`Bus::gap_before(topic, subscriber_id)` returns `None` when the subscriber has no persisted cursor (fresh subscriber — no gap possible), and `None` when the persisted cursor is `>= oldest_offset` (still within the retention window).'
  - '`Bus::gap_before` returns `Some(Gap { persisted_cursor, oldest_offset, skipped })` when the persisted cursor is `< oldest_offset` (records in the gap were swept), with `skipped = oldest_offset - persisted_cursor`.'
  - '`gap_before` returns `BusError::UnknownTopic` for an unregistered topic (mirrors `oldest_offset` / `subscribe`), and `None` for a topic with zero live records.'
  - 'Unit tests prove all four paths: fresh (no cursor → None), caught-up (cursor >= oldest → None), fell-behind (cursor < oldest → Some with correct skipped count), unknown-topic (Err). Full `cargo test -p termlink-bus --lib` stays green (95 passed).'

