outcomes:
  - 'The hub handles a WS-only `hub.ws_subscribe` control message (`params.topics: [..]`) that sets a per-connection topic filter; it is auth-gated (requires an authenticated `observe`-capable connection — an unauthenticated call is refused, not silently accepted) and returns an ack listing the active subscription. `cargo build --release -p termlink-hub` succeeds. *(`maybe_handle_ws_subscribe` — release build green.)*'
  - 'After subscribing, the push loop forwards ONLY `hub.event` frames whose `topic` matches the filter; entries match exactly, or as a prefix when written `stem*`. A second `hub.ws_subscribe` replaces the filter. *(`ws_topic_matches` + push-gate; `ws_topic_matches_exact_and_prefix` unit test.)*'
  - 'Opt-in default: an authenticated WS connection that has NOT sent `hub.ws_subscribe` receives NO pushes (the S2 firehose is now gated behind an explicit subscribe). The S2 push test was updated to subscribe first, reflecting the tightened contract. *(Empty filter matches nothing; `ws_subscribe_topic_filter` proves the unsubscribed-authed case.)*'
  - 'Degrade-to-poll contract: the events delivered over WS are the same aggregator events readable via the existing poll path — a client with no WS (or a dropped WS) still reads them by polling. Verified by all 376 hub tests (line-protocol + event-poll) still passing — the substrate path is untouched.'
  - 'A unit test (`server::tests::ws_subscribe_topic_filter`) proves filtering: connect + auth + `hub.ws_subscribe` to a specific topic, inject one matching and one non-matching `AggregatedEvent`, assert only the matching one is pushed; and assert an authed-but-unsubscribed connection receives neither. Passes in CI.'

