summary: "Final batch of the MCP JSON standardization sweep."

# T-896: Standardize MCP resize and request tool outputs to structured JSON

**Completed:** 2026-04-05
**Type:** refactor
**Duration:** 2026-04-05 (same day, ~7 min)

## What Was Done
Final batch of the MCP JSON standardization sweep. Converted `termlink_resize` to return JSON with `ok`, `cols`, `rows`. Converted `termlink_request` to return JSON with `ok`, `request_id`, `reply_topic`, `response`. Converted `termlink_wait` to return JSON with `ok`, `topic`, `event` on success or `ok: false`, `error` on timeout. Updated integration tests for wait_timeout, request_timeout, and wait_receives_event.

## Key Decisions
- `termlink_wait` timeout returns `ok: false` with error message rather than raising an MCP error, keeping timeout as a normal flow outcome rather than an exception.

## Patterns Observed
- Completes the three-task sweep (T-894, T-895, T-896) that standardized all MCP tool outputs to structured JSON, with T-900 handling the final straggler.

## Artifacts
- Modified: MCP tool handlers for resize, request, wait
- Modified: Integration tests for wait and request timeout paths
