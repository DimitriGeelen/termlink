  WS-S2 broadcastâ†’client push loop â€” split+select!, hub.event notifications gated on auth (arc-004)

# Key outcomes
outcomes:
  - '`handle_ws_connection` splits the WebSocket into a read half and a write half and runs a `tokio::select!` loop, so the hub can send server-initiated frames concurrently with handling client request frames (no longer strictly requestâ†’response). `cargo build --release -p termlink-hub` succeeds.'
  - 'After a WS connection authenticates (`granted_scope` becomes `Some`), the hub subscribes to the aggregator `broadcast::Receiver<AggregatedEvent>` and pushes each event to the client as a JSON-RPC notification frame (`{"jsonrpc":"2.0","method":"hub.event","params":<AggregatedEvent>}`) â€” delivered without the client sending any request. `broadcast::error::Lagged` is handled (skip + continue), not fatal.'
  - 'Push is gated on auth: a WS connection that has NOT authenticated receives no `hub.event` pushes (events are drained but dropped until `granted_scope` is `Some`).'
  - 'Concurrency preserved: request/response still works over the same WS connection while the push loop runs (a client can call `hub.auth` / `session.discover` and get responses interleaved with pushes). All existing hub tests (line protocol + the S1 WS upgrade test) still pass.'
  - 'A unit test (`server::tests::ws_push_*`) proves push end-to-end: connect a WS client, authenticate, inject an `AggregatedEvent` into the aggregator, and assert the client receives the pushed `hub.event` frame carrying that event; also assert a pre-auth connection does not receive the pushed event. Passes in CI.'

