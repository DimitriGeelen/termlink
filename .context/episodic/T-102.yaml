summary: >
  Explored an architectural constraint requiring the orchestrator agent to make a tool call
  with every substantive response, eliminating invisible pure-conversation turns. Three
  variants analyzed (mandatory fw note, spawn-for-conversation, scribe agent). Decision:
  NO-GO because Claude Code lacks a response boundary hook to enforce the constraint,
  making all variants unimplementable at the platform level.

