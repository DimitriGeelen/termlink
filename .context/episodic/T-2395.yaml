outcomes:
  - '**B3 hop plumbing (send):** `agent-send.sh` accepts `--relay-hops N` and, when set (or when the doorbell is rail-augmented = a relay initiation, defaulting to 1), stamps `--metadata relay_hops=<N>` onto the posted turn. The `--dry-run` RESOLVED line surfaces `relay_hops=<N>` so it is assertable without a hub. A non-relay send (custom `--doorbell-text`, no `--relay-hops`) stamps NO relay_hops (back-compat).'
  - '**B3 hop plumbing (reply):** `agent-respond.sh` accepts `--relay-hops N` and stamps `--metadata relay_hops=<N>` onto the `--reply` turn when set (the caller passes incoming+1). Absent the flag, no relay_hops is stamped (back-compat with existing receipt/reply callers).'
  - '**B3 circuit-breaker helper:** new `scripts/relay-hop-check.sh --topic <t> --cid <c>` reads the latest turn on (topic, cid), extracts `relay_hops` metadata, compares to `TERMLINK_RELAY_MAX_HOPS` (default 4). Emits `verdict=continue hops=<N> cap=<M> next_hops=<N+1>` (exit 0) when under cap, or `verdict=stop hops=<N> cap=<M> reason=hop-budget-exhausted` (exit 10) at/over cap. A hub-independent test seam (`TERMLINK_RELAY_HOPCHECK_TEST_JSON=<file>`) feeds canned turn JSON. Missing/absent relay_hops treated as hops=0 (continue).'
  - '**B2 continuation contract + B3 gate (receive):** `.claude/commands/check-arc.md` Step 6a documents the advance-or-declare contract (woken agent: advance to next REAL blocker → reply on this rail via `agent-respond.sh --reply --relay-hops <next_hops>`, OR declare the blocker + STOP; never idle silently) AND instructs running `scripts/relay-hop-check.sh` BEFORE auto-replying: on `verdict=stop`, surface the hop-budget-exhausted blocker LOUDLY and halt (do not reply); on `verdict=continue`, pass `--relay-hops <next_hops>` to the reply.'
  - '**Tests:** `tests/relay-b3-hop-budget.sh` asserts the helper emits `continue`/`next_hops` below cap and `stop`/`hop-budget-exhausted` at cap (via the test seam); `tests/relay-b2-send-hops.sh` (or extend the B1 test) asserts `agent-send.sh --relay-hops 2 --dry-run` surfaces `relay_hops=2` and a bare relay initiation defaults to `relay_hops=1`. `bash -n` clean on all three edited/new scripts.'

