# Decisions (from task file Decisions section)
decisions:
  - decision: '2026-07-05 — firing gate: declared per-hub floor vs cross-hub skew'
    chose: 'declared per-hub version floors in a canary-owned config file (`.context/cron/fleet-version-floors.conf`), with `-` exemption for foreign lineages'
    rationale: 'patch numbers are commits-since-tag and are NOT comparable across build lineages — ring20-dashboard serves 0.11.806 from its own fork, numerically "newest" while lacking our commits; skew detection would false-positive on it forever AND miss same-lineage lag if the stale hub happened to be numerically close. A floor is also the semantic G-069 wants: bumping it when rails ship is the operator declaring "shipped must mean capability-live".'
    alternatives_rejected: ['(a) cross-hub skew threshold (unsound across lineages, both directions); (b) compare-to-local-VERSION for all hubs (fires permanently on hubs we don''t deploy to); (c) hubs.toml extra keys for floors (risk of tripping the binary''s TOML parser — canary-owned file is decoupled)']
  - decision: '2026-07-05 — unknown hub_version on a floored reachable hub fires'
    chose: 'treat missing `hub_version` as firing, not informational'
    rationale: 'a hub too old to report its version IS the staleness class the canary exists for; classifying it informational would let the worst offenders hide'
    alternatives_rejected: ['informational (hides pre-version-field binaries); exit-2 tooling error (it is a data finding, not a tooling failure)']
