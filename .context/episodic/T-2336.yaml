# Decisions (from task file Decisions section)
decisions:
  - decision: '2026-07-03 — `webhook test` mirrors production deny-by-default (does NOT auto-permit the URL host)'
    chose: '`test` runs the URL against the config''s allowlist + explicit `--allowed-host` extras only; it does NOT auto-add the URL''s own host. A host absent from the allowlist refuses loudly with an actionable `--allowed-host` hint.'
    rationale: 'The whole point of `test` is to verify a target behaves as it WOULD in production. Auto-permitting the tested host would silently bypass the SSRF guard the feature exists to enforce — the operator would get a green "✓ dispatched" for a target the hub would actually refuse. Deny-by-default consistency > convenience.'
    alternatives_rejected: ['Auto-adding the URL host to the effective allowlist (first implementation). Made the SSRF-refusal path unreachable via `test`, defeating AC-3''s "surfaced loudly" clause.']
  - decision: '2026-07-03 — Signing-key generation via `/dev/urandom`, not a new `rand` dependency'
    chose: 'Read 32 bytes from `/dev/urandom` directly for auto-generated signing keys.'
    rationale: 'The CLI crate has no direct `rand`/`getrandom` dependency; `/dev/urandom` is cryptographically adequate on Linux (the deploy target) and dependency-free. Avoids widening the CLI dependency graph for one helper.'
    alternatives_rejected: ['Adding `rand`/`getrandom` as a direct dep (unnecessary surface); time-based pseudo-secret (not unpredictable — unsafe for an HMAC key).']
  - decision: '2026-07-03 — Expose `url_host` + `build_test_client` from the hub crate rather than re-implement in CLI'
    chose: 'Made `webhook::url_host` public and added `webhook::build_test_client()` in the hub crate; the CLI reuses both plus the existing `dispatch`/`sign_payload`.'
    rationale: 'Single source of truth. Host extraction and the aws-lc-rs crypto-provider install (PL-238) must match the hub''s dispatch path exactly, or the CLI''s `test` could pass while production refuses (or vice-versa). Re-implementing the reqwest::Url parse + provider-pin dance in the CLI would invite drift and re-introduce the PL-238 "No provider set" trap.'
    alternatives_rejected: ['Adding `reqwest` as a direct CLI dependency to parse URLs client-side (drift risk + the crypto-provider pin would have to be duplicated).']

