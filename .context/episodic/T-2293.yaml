# Key outcomes
outcomes:
  - 'Registry resolves `agent_id` → `{host:port, hub, topics-read, liveness}` for a registered peer — `termlink agent resolve <agent_id> [--json]` (new) via `resolve_agent_registry_via_fleet`. Live proof: resolved `v2-selftest` → LIVE, hub `192.168.10.107:9100`, topics `dm:v2-selftest:*, agent-chat-arc`, fingerprint+host+role.'
  - 'Observed address is self-reported by the agent (`metadata.addr`), with the resolver falling back to the hub it read the heartbeat from when absent — **self-report baseline shipped** (heartbeat now emits `addr=<hub>`; resolver prefers it, else stamps the found-on hub). The stronger **hub-stamped observed source addr** (hub attests the addr it saw, defeating self-report staleness/spoofing) is sliced to **T-2297 (V2b)**, which V6 (direct transport) consumes — see Decision below.'
  - 'A fleet-rollup reader walks `hubs.toml` and merges per-hub registries with a short TTL — the resolver walks all hubs (dedup by address), bounded by an 8s per-hub timeout so a dead hub never stalls the walk; liveness TTL via the `agent-presence` 2x/5x interval bands (`fleet_presence`).'
  - 'Reverse lookup works: a recipient can resolve the SENDER''s address (symmetric, both directions) — `agent resolve` works for ANY agent_id including the caller''s own; symmetric by construction (same code path).'
  - 'The G-155 false-green probe is fixed: `agent resolve` returns "found" only when the intended correspondent actually has a heartbeat (LIVE/STALE/OFFLINE) on a hub — NOT when a configured hub''s TLS merely handshakes (exit 4 on truly-absent). Unlike `fleet verify`/`fleet doctor`, a configured-but-empty hub yields not-found here.'

