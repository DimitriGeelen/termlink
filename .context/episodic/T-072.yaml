outcome: |
  Created termlink-test-utils workspace crate with 5 shared test helpers:
  TestDir (unique temp dirs with auto-cleanup on drop), ProcessGuard (RAII
  kill-on-drop), wait_for_socket/wait_for_data_socket (polling with timeout),
  start_session (async session fixture), termlink_cmd (CLI command builder
  with isolated runtime dir). Refactored termlink-session integration tests
  and termlink-cli integration tests to use shared helpers, removing ~100
  lines of duplicated boilerplate. All 223 tests pass after refactoring.

