# Decisions (from task file Decisions section)
decisions:
    chose: "`BusClient::flush() -> FlushReport` owns the flush loop; `OfflineQueue` exposes only `peek_oldest` / `pop` / `bump_attempts` primitives"
    rationale: "The client holds the socket path + RPC machinery; routing flush through the queue would force `OfflineQueue` to take a `&BusClient` (or equivalent trait object), creating a dependency inversion with no real payoff. Keeps each type's responsibility crisp: queue is dumb storage, client is the transport + retry policy"
    alternatives_rejected: ["The AC-literal shape `queue.flush(&client)` — functionally equivalent, worse layering"]
    chose: "`oneshot::Sender<()>` stored in `BusClient::shutdown_tx` (behind `Mutex<Option<_>>`); `Drop` takes the sender and drops it, which completes the receiver side in the spawned task"
    rationale: "`tokio::sync::Notify::notify_waiters()` only wakes *currently registered* waiters — when `Drop` fires immediately after `tokio::spawn`, the task may not yet have polled `.notified()`, so the signal is lost. Oneshot has no such race: recv completes whether polled first or last"
    alternatives_rejected: ["`Notify` (race, observed as a failing `drop_notifies_flush_task` test); `CancellationToken` from tokio-util (extra dep for the same guarantee)"]

