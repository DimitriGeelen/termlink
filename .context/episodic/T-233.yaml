summary: >
  GO decision on specialist agent orchestration. The most architecturally significant
  inception in the project: 22 mesh agents across 3 research rounds produced 23 research
  files establishing the layered capability discovery system. Dogfooded TermLink mesh
  dispatch as the coordination layer during its own research.

architectural_vision: >
  An orchestrator agent recognizes delegation opportunities and routes to specialist agents
  pre-loaded with domain context, running as TermLink sessions. Each specialist has its own
  200K context window (N specialists = N × 200K capacity). The system matures over time:
  first interactions require full negotiation, subsequent ones use cached routes, eventually
  work executes locally via bypass.

key_decisions:
  - decision: "GO on specialist orchestration"
    rationale: "All 3 go criteria met. No no-go triggered. 22 agents validated pattern in practice."

  - decision: "Deterministic-first execution with stochastic fallback"
    rationale: "Scripts/skills execute when possible. On failure, stochastic agent remediates and codifies fix back into deterministic path (antifragility)."

  - decision: "Framework owns policy, TermLink owns mechanism"
    rationale: "Separation of concerns. Litmus test: if we replaced TermLink with Unix pipes, orchestration still works. Transport is pluggable."

  - decision: "Layered capability discovery with progressive autonomy"
    rationale: "3-layer system — bypass registry (Tier 3 local), route cache (direct to specialist), orchestrator.route hub RPC (full discovery + negotiation). First use = full round-trip, nth use = local bypass."

  - decision: "Qualitative trust supervision, not run counters"
    rationale: "Three axes: script maturity (travels with script), context familiarity (resets per project), blast radius (varies per project). Failed-and-recovered scripts score HIGHER (antifragility)."

  - decision: "Build on enforcement tiers (proven), not healing loop (dormant)"
    rationale: "Tiers have 3 real blocks logged across 538 commits. Healing loop has 0 invocations in 210 tasks."

