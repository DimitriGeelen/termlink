summary: >
  Built the `termlink interact` CLI command that wraps inject + marker detection + poll
  into a single call. Injects a command with a unique UUID marker into a PTY session,
  polls query.output until the marker appears, and returns the captured output. Supports
  --strip-ansi, --json structured output, configurable timeout and poll interval.
  Added 5 unit tests for ANSI stripping. All 249 existing tests pass.

