# T-925: termlink ping --target — first --target rollout

**Completed:** 2026-04-11
**Type:** build
**Duration:** 2026-04-11 (same day, ~4 min)

## What Was Done
First per-command rollout of `--target` cross-host routing. Wired `termlink ping` through T-924's `call_session` helper. Discovered and resolved a naming collision: renamed `TargetOpts.target` to `TargetOpts.hub` (Rust field only; CLI flag stays `--target` via `#[arg(long = "target")]`). Added four new flags to ping (--target, --secret-file, --secret, --scope). Local path behavior unchanged. Smoke-tested against a real local session.

## Key Decisions
- Renamed TargetOpts.target to TargetOpts.hub to resolve collision with every command's existing `target` positional (session identifier). CLI flag stays `--target` per T-921 inception.
- Routed every ping through `call_session` (including local path) to keep both code paths unified in one place.
- When `--target` is set, session argument is mandatory (no remote interactive picker).

## Patterns Observed
- First-consumer rollout surfaced a naming collision that affects all downstream consumers. Fixing it here (T-925) unblocked T-926..T-935 cleanly.

## Artifacts
- Modified: `crates/termlink-cli/src/target.rs` (field rename)
- Modified: `crates/termlink-cli/src/cli.rs` (Ping variant)
- Modified: `crates/termlink-cli/src/commands/session.rs` (cmd_ping routing)
