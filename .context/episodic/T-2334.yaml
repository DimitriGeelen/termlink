# Decisions (from task file Decisions section)
decisions:
  - decision: '2026-07-03 — in-memory retry queue vs durable sqlite (T-2051 reuse)'
    chose: 'in-memory bounded `VecDeque` retry queue reusing the *shape* of the T-2051 offline-queue flush loop (attempts counter + jittered periodic drain + poison→dead-letter), NOT its SQLite store.'
    rationale: 'the hub is long-running so durability-across-restart is a real but low-value benefit here — webhook fan-out is best-effort/opt-in and external endpoints are expected to be idempotent. In-memory avoids a `Mutex<Connection>` on the hot `channel.post` path, a new sqlite file, and schema/migration burden. PL-111 flags that restart-surviving state belongs in runtime_dir; this is a deliberate, documented tradeoff (in-flight retries are lost on hub restart) that can graduate to a durable table later if dropped-on-restart webhooks prove to matter.'
    alternatives_rejected: ['durable `OfflineQueue`-style sqlite table keyed on target+topic — correct only if webhook delivery were governance-critical (T-2243 dead-letter class); it isn''t for v1.']
  - decision: '2026-07-03 — jitter entropy without a new crate'
    chose: 'derive ±25% backoff jitter from `SystemTime::now().subsec_nanos()`.'
    rationale: 'decorrelates retries across targets (T-2055 thundering-herd guard) without adding the `rand` crate to the hub''s dependency surface (Directive 4 — minimal deps). subsec_nanos is more than enough entropy to spread retry times across a fleet of targets.'
    alternatives_rejected: ['adding `rand` — unnecessary weight for a non-cryptographic jitter; deterministic-only backoff — reintroduces the thundering-herd risk T-2055 fixed for the offline queue.']
  - decision: '2026-07-03 — retry classification (which failures retry)'
    chose: '2xx=Success, 4xx + config errors (bad URL / non-allowlisted host)=PermanentDrop, 5xx/3xx/1xx + transport errors=Retryable.'
    rationale: 'standard webhook semantics — a 4xx or a config error will never succeed on retry (retrying just wastes attempts and hammers the endpoint), whereas 5xx/transport failures are transient. Prevents a misconfigured target from consuming the whole retry budget.'
    alternatives_rejected: ['retry everything — would loop a permanently-broken 4xx target to the dead-letter for no benefit.']

