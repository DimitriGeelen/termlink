# T-927: termlink signal --target — third rollout

**Completed:** 2026-04-11
**Type:** build
**Duration:** 2026-04-11 (same day, ~2 min)

## What Was Done
Third per-command rollout of `--target`. Added four cross-host routing flags to `termlink signal` and routed `cmd_signal` through `call_session`. Extended `default_scope_for` in target.rs to classify `command.signal` as `control` scope (matching session-side auth). Signal's required positional target (not optional like ping/status) simplified the dispatch path.

## Key Decisions
None -- followed T-925 pattern. Scope extension was mechanical (adding `command.signal` to the control tier in `default_scope_for`).

## Patterns Observed
None.

## Artifacts
- Modified: `crates/termlink-cli/src/cli.rs` (Signal variant)
- Modified: `crates/termlink-cli/src/commands/session.rs` (cmd_signal routing)
- Modified: `crates/termlink-cli/src/target.rs` (default_scope_for: command.signal -> control)
