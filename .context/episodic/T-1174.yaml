# Decisions (from task file Decisions section)
decisions:
    chose: "`cmd_channel_post` calls `client.flush().await` BEFORE issuing its own `post(pending)`, but only when `queue_size() > 0`"
    rationale: "CLI is one-shot — the BusClient's background 5 s flush task never gets a tick before process exit. Without inline flush, the queue would grow indefinitely across CLI invocations. Flushing *before* the new post preserves FIFO (queued items land first, new one takes the next offset), and reports \"Drained N queued post(s) from previous offline period\" so operators see the catch-up"
    alternatives_rejected: ["(a) Flush after post — would reorder offsets (new post gets offset N, queued items get N+1..N+K, but they were enqueued earlier — semantic drift). (b) Leave the async flush task alone — works only for long-running consumers; CLI users would accumulate queue forever. (c) Add a dedicated `termlink channel flush` verb — more surface area for the same thing a post call can do implicitly"]
    chose: "New `hub_socket_soft(hub)` returns the path unconditionally; `cmd_channel_post` uses it; `subscribe`/`list`/`create` keep the strict `hub_socket(hub)?` that bails on missing socket"
    rationale: "Only `post` has an offline fallback. `subscribe`/`list`/`create` genuinely can't proceed without a live hub (there's no local state to return). Keeping the strict resolver on those paths preserves the clear \"hub not running\" error that ops expect"
    alternatives_rejected: ["Relaxing `hub_socket` across all verbs — would make `subscribe` silently return empty when the hub is down, hiding a failure mode operators need to see"]

