  - "`--json` flag still works in both cases; JSON shape is `{\"delivered\": {\"offset\": N, \"ts\": T}}` vs `{\"queued\": {\"queue_id\": N, \"queue_path\": \"...\"}}` (new but small, backward-compatible for consumers who key off `\"offset\"` vs `\"queue_id\"`)"
  - "Live smoke test run by agent (see transcript in Updates below): hub up → Delivered; hub down → Queued x3 → pending:3; hub restart → next CLI post drains all 3 in FIFO then delivers its own at offset=3; pending:0; subscribe shows perfect FIFO"
