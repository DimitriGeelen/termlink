# T-904: Multi-LLM model routing for dispatch

**Completed:** 2026-04-11
**Type:** build
**Duration:** 2026-04-08 to 2026-04-11 (3 days)

## What Was Done
Extended the dispatch system with multi-LLM model selection. Added optional `model` parameter (opus/sonnet/haiku) to DispatchParams (MCP) and DispatchOpts (CLI), passed as `TERMLINK_MODEL` env var to spawned workers. Implemented model-level circuit breaker with fallback chain (opus to sonnet to haiku) and per-model success rate tracking in the route cache via ModelStats.

## Key Decisions
None recorded.

## Patterns Observed
None.

