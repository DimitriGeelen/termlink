# T-2359 — declared per-hub version floors for check-fleet-binary-freshness.sh
# (G-069 prevention). Format: <hub-name-from-hubs.toml> <min-version | ->
#   <min-version>  fire when the hub SERVES below this (in-memory process, not disk)
#   -              exempt: foreign build lineage or expected-transient host
# Optional `* <min-version>` row applies to undeclared hubs.
#
# BUMP THE FLOOR WHEN HUB-SIDE RAILS SHIP: that is the operator's declaration
# that "shipped" must mean "capability-live" — the canary then names lagging
# hubs daily until they are restarted onto the new binary. Patch numbers are
# commits-since-tag and are NOT comparable across build lineages — never set
# a floor for a hub whose binary you don't build.

