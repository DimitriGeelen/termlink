tags: [dispatch, worktree, persistence]

purpose: "Dispatch manifest — tracks worktree branches created by `termlink dispatch --isolate`. Persists lifecycle state (pending → merged | conflict | deferred | expired) to .termlink/dispatch-manifest.json so subsequent `termlink dispatch merge`, `cleanup`, and status commands can reconcile long-lived worker branches."

