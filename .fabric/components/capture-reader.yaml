id: capture-reader
name: "JSONL Transcript Reader"
type: script
subsystem: capture
location: agents/capture/read-transcript.py
purpose: >
  Extracts human/agent conversation turns from the current Claude Code session's
  JSONL transcript. Used by the /capture skill to save volatile conversation
  content to disk before it is lost.
interfaces:
  - CLI: python3 read-transcript.py [--dry-run|--last-n N|--all]
  - stdout: JSON {session_file, total_turns, captured_turns, topic_start_index, capture_mode, turns[]}
  - stderr: warnings (format canary failures, missing transcript)
depends_on:
  - target: .claude/commands/capture.md
    type: invoked-by
depended_by: []
tags: [capture, jsonl, conversation, session, antifragility]
created: 2026-03-11
task: T-108
