purpose: Hub-level file inbox (T-988) — queues file-transfer events (FileInit, FileChunk, FileComplete) to disk when a send-file
  targets an offline session. On target registration the hub replays pending transfers from {runtime_dir}/inbox/{target_name}/{transfer_id}/
  so delivery survives restarts and late-joiners.
