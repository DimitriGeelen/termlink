# TermLink Subsystem Map
# Defines the high-level architecture for fabric overview and onboarding

subsystems:
  - id: protocol
    name: protocol
    description: "Wire protocol definitions — JSON-RPC 2.0 control plane + binary data plane frames"
    root: crates/termlink-protocol/src/
    depends_on: []
    summary: "Foundation layer: JSON-RPC, binary frames, error types, method constants"
    components:
      - crates/termlink-protocol/src/lib.rs
      - crates/termlink-protocol/src/control.rs
      - crates/termlink-protocol/src/data.rs
      - crates/termlink-protocol/src/error.rs
      - crates/termlink-protocol/src/events.rs
      - crates/termlink-protocol/src/jsonrpc.rs
      - crates/termlink-protocol/src/transport.rs

  - id: session
    name: session
    description: "Session lifecycle — identity, registration, discovery, handlers, PTY, events, data plane"
    root: crates/termlink-session/src/
    depends_on: [protocol]
    summary: "Core business logic: session management, RPC handlers, PTY, events, streaming"
    components:
      - crates/termlink-session/src/lib.rs
      - crates/termlink-session/src/auth.rs
      - crates/termlink-session/src/identity.rs
      - crates/termlink-session/src/discovery.rs
      - crates/termlink-session/src/lifecycle.rs
      - crates/termlink-session/src/liveness.rs
      - crates/termlink-session/src/registration.rs
      - crates/termlink-session/src/manager.rs
      - crates/termlink-session/src/client.rs
      - crates/termlink-session/src/codec.rs
      - crates/termlink-session/src/data_server.rs
      - crates/termlink-session/src/events.rs
      - crates/termlink-session/src/executor.rs
      - crates/termlink-session/src/handler.rs
      - crates/termlink-session/src/pty.rs
      - crates/termlink-session/src/scrollback.rs
      - crates/termlink-session/src/server.rs
      - crates/termlink-session/src/transport.rs

  - id: hub
    name: hub
    description: "Message hub — routes requests between sessions, fan-out broadcast, fan-in collection"
    root: crates/termlink-hub/src/
    depends_on: [protocol, session]
    summary: "Router/broker: discovery, request forwarding, broadcast, event collection"
    components:
      - crates/termlink-hub/src/lib.rs
      - crates/termlink-hub/src/pidfile.rs
      - crates/termlink-hub/src/router.rs
      - crates/termlink-hub/src/server.rs
      - crates/termlink-hub/src/supervisor.rs

  - id: cli
    name: cli
    description: "User-facing CLI binary — 26+ subcommands for session management and communication"
    root: crates/termlink-cli/src/
    depends_on: [protocol, session, hub]
    summary: "User entry point: modular CLI with 10 command modules (session, pty, events, metadata, execution, infrastructure, token, remote, agent, file)"
    components:
      - crates/termlink-cli/src/main.rs
      - crates/termlink-cli/src/cli.rs
      - crates/termlink-cli/src/config.rs
      - crates/termlink-cli/src/util.rs
      - crates/termlink-cli/src/commands/mod.rs
      - crates/termlink-cli/src/commands/session.rs
      - crates/termlink-cli/src/commands/pty.rs
      - crates/termlink-cli/src/commands/events.rs
      - crates/termlink-cli/src/commands/metadata.rs
      - crates/termlink-cli/src/commands/execution.rs
      - crates/termlink-cli/src/commands/infrastructure.rs
      - crates/termlink-cli/src/commands/token.rs
      - crates/termlink-cli/src/commands/remote.rs
      - crates/termlink-cli/src/commands/agent.rs
      - crates/termlink-cli/src/commands/file.rs

  - id: agent-mesh
    name: agent-mesh
    description: "Agent mesh — dispatch tasks to Claude Code agents via TermLink events"
    root: agents/mesh/
    depends_on: [cli, hub, session]
    summary: "Orchestration layer: agent wrapper, synchronous dispatch, event-driven worker + orchestrator"
    components:
      - agents/mesh/agent-wrapper.sh
      - agents/mesh/dispatch.sh
      - agents/mesh/merge-branches.sh
      - agents/mesh/orchestrate.sh
      - agents/mesh/prompt-template.sh
      - agents/mesh/worker.sh
