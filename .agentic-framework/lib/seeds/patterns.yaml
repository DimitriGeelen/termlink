# Framework Patterns — Seeded by fw init
# Universal patterns learned from 96+ tasks of framework development.
# scope: universal — applies to all projects using the framework
# scope: project — specific to the originating project (not seeded)
#
# To add a project-specific pattern: fw context add-pattern <type> "name" --task T-XXX
# Universal patterns are synced from the framework via: fw governance sync (planned)

failure_patterns:
  - id: FP-003
    pattern: "dependency-version-conflict"
    description: "Package version conflicts prevent installation when project has pinned dependencies"
    scope: universal
    inherited_from: framework
    origin_task: T-026
    mitigation: "Use built-in libraries or vendored dependencies to avoid version conflicts"

  - id: FP-004
    pattern: "Context exhaustion before handover"
    description: >
      Agent outputs consume context faster than expected. Handover generated as skeleton
      with [TODO] placeholders is useless for recovery.
    scope: universal
    inherited_from: framework
    origin_task: T-059
    mitigation: "Token-aware monitoring from JSONL transcript. Commit early and often. Generate handovers AFTER work, not before."

  - id: FP-005
    pattern: "Plugin authority override bypasses framework governance"
    description: >
      Third-party plugins using authority-claiming language ('YOU MUST', 'BEFORE ANY response')
      override framework rules. Skills rarely reference task creation.
    scope: universal
    inherited_from: framework
    origin_task: T-061
    mitigation: "Instruction precedence in CLAUDE.md, PreToolUse structural gate, plugin audit tool"

  - id: FP-006
    pattern: "Premature task closure with post-closure drift"
    description: >
      Task marked work-completed before all work is done. Subsequent commits reference
      a closed task. Episodic snapshot freezes at premature closure time.
    scope: universal
    inherited_from: framework
    origin_task: T-112
    mitigation: "Acceptance criteria gate in update-task.sh. Closed task commit warning in commit-msg hook."

  - id: FP-007
    pattern: "Silent error bypass"
    description: >
      Agent encounters an error and silently switches to an alternative approach without
      investigating the root cause. The original error may indicate a deeper problem.
    scope: universal
    inherited_from: framework
    origin_task: T-118
    mitigation: "CLAUDE.md error investigation protocol: STOP, investigate, report, fix, then proceed."

success_patterns:
  - id: SP-001
    pattern: "Phased implementation"
    description: "Breaking large changes into numbered phases improves traceability and reviewability"
    scope: universal
    inherited_from: framework
    origin_task: T-014
    context: "5-phase audit improvement was easier to review and commit"

  - id: SP-002
    pattern: "Hybrid agent architecture"
    description: "Bash scripts for mechanical work + AGENT.md for intelligence guidance"
    scope: universal
    inherited_from: framework
    origin_task: T-002
    context: "Scripts are reliable and portable, AGENT.md provides judgment guidance"

  - id: SP-003
    pattern: "Commit early, commit often"
    description: >
      Frequent commits preserve work even when session context is lost.
      Each commit is a recovery point.
    scope: universal
    inherited_from: framework
    origin_task: T-059
    context: "Despite losing all context, all code changes were preserved because phases were committed before exhaustion"

  - id: SP-004
    pattern: "Graduated enforcement: detect-then-prevent"
    description: >
      Build detective controls first (audit), then preventive controls (hooks/gates).
      Evidence from detective controls justifies and shapes preventive ones.
    scope: universal
    inherited_from: framework
    origin_task: T-061
    context: "Investigation (detective) provided evidence for PreToolUse hook (preventive). Both layers needed."

antifragile_patterns:
  - id: AF-001
    pattern: "Failure-driven capability acquisition"
    description: >
      System failures trigger post-mortems that lead to capabilities that didn't exist before.
      The system becomes stronger than if the failure never occurred.
    scope: universal
    inherited_from: framework
    origin_task: T-059
    trigger: "Session context exhaustion with stale handover"
    capability_gained: "Real-time context budget monitoring with graduated warnings"
    directive: D1

workflow_patterns:
  - id: WP-001
    pattern: "Task absorption"
    description: "Related small tasks can be absorbed into a larger coherent task"
    scope: universal
    inherited_from: framework
    origin_task: T-013
    example: "Multiple small tasks absorbed into a single coherent agent task"

  - id: WP-002
    pattern: "Experiment protocol: baseline-disable-measure-restore"
    description: >
      To validate that an enforcement mechanism is load-bearing: establish a baseline metric,
      disable the mechanism, perform operations, measure degradation, restore the mechanism.
    scope: universal
    inherited_from: framework
    origin_task: T-024
    example: "Disabled git hook, made 5 commits, traceability dropped 97% to 88%. Proved hooks are load-bearing."
