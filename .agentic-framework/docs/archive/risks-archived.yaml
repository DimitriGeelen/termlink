# Risk Register — ISO 27001-aligned (T-194)
# Likelihood (1-5) × Impact (1-5) = Score (1-25)
# Ranking: Low (1-4), Medium (5-9), High (10-16), Urgent (17-25)
#
# Schema:
#   id: R-XXX
#   title: Short description
#   category: governance|context|knowledge|quality|tooling|operational|session|architecture|oversight
#   description: What can go wrong
#   likelihood: 1-5 (Rare/Unlikely/Possible/Likely/Almost certain)
#   impact: 1-5 (Negligible/Minor/Moderate/Major/Severe)
#   score: L × I
#   ranking: low|medium|high|urgent
#   evidence: Task/incident references
#   controls: [CTL-XXX] IDs from controls.yaml (normalized T-197)
#   control_status: closed|decided-build|acknowledged|watching
#   residual_notes: What risk remains after controls

risks:
  # === GOVERNANCE BYPASS ===
  - id: R-001
    title: "External code overrides governance rules"
    category: governance
    description: "Plugins, skills, or third-party code claim authority over CLAUDE.md rules, bypassing task-first enforcement"
    likelihood: 2  # Fixed by hooks, but new plugins could re-emerge
    impact: 4      # Governance integrity compromised
    score: 8
    ranking: medium
    evidence: [T-061, T-062, T-063]
    controls: [CTL-001]
    control_status: closed
    residual_notes: "New plugins could still attempt override; hook is the structural backstop"

  - id: R-002
    title: "Human-verifiable criteria completed without human verification"
    category: governance
    description: "Agent checks behavior/UX acceptance criteria based on code existence, not actual observation"
    likelihood: 4  # Happens on every task with behavior ACs
    impact: 4      # Quality assurance falsified
    score: 16
    ranking: high
    evidence: [T-057, G-006, G-010, T-192]
    controls: [CTL-012, CTL-025]
    control_status: implemented
    residual_notes: "CTL-025 (T-193) structurally gates on ### Agent ACs only; human ACs non-blocking. Partial-complete keeps task visible. Residual: agent could mislabel ACs at authoring time."

  - id: R-003
    title: "Architectural decisions made without inception exploration"
    category: governance
    description: "Agent skips inception process despite knowing the rule, making architectural decisions directly"
    likelihood: 3  # Observed with T-138
    impact: 3      # Wrong architecture chosen, rework needed
    score: 9
    ranking: medium
    evidence: [T-138, L-042]
    controls: [CTL-001, CTL-009, CTL-014]
    control_status: closed
    residual_notes: "Gate enforces after 2 commits but agent can build and commit once without gate"

