<div class="search-hero">
    <form action="{{ url_for('discovery.search_view') }}" method="get" role="search"
          hx-get="{{ url_for('discovery.search_view') }}" hx-target="#content" hx-swap="innerHTML" hx-push-url="true"
          id="search-form">
        <!-- Search bar (Pico fieldset group for proper layout) — hidden in Ask AI mode -->
        <fieldset role="group" class="mb-0" id="search-bar">
            <input type="search" name="q" id="search-input" value="{{ query | default('') }}"
                   placeholder="Search your knowledge base..."
                   aria-label="Search" minlength="2" required autofocus
                   autocomplete="off">
            <button type="submit">Search</button>
        </fieldset>

        <!-- Mode pills + settings gear + hint -->
        <div class="search-controls">
            <div class="search-mode-pills" role="radiogroup" aria-label="Search mode">
                <button type="button" class="mode-pill{% if mode|default('hybrid') == 'hybrid' and not is_chat %} active{% endif %}" data-mode="hybrid">All</button>
                <button type="button" class="mode-pill{% if mode|default('hybrid') == 'keyword' %} active{% endif %}" data-mode="keyword">Keyword</button>
                <button type="button" class="mode-pill{% if mode|default('hybrid') == 'semantic' %} active{% endif %}" data-mode="semantic">Semantic</button>
                <button type="button" class="mode-pill{% if is_chat %} active{% endif %}" data-mode="ask" style="background: {% if is_chat %}var(--pico-primary){% else %}none{% endif %}; color: {% if is_chat %}#fff{% else %}var(--pico-muted-color){% endif %};">Ask AI</button>
            </div>
            <select name="mode" id="search-mode-select" aria-hidden="true" style="display:none;">
                <option value="hybrid" {{ 'selected' if mode|default('hybrid') == 'hybrid' }}>Hybrid</option>
                <option value="keyword" {{ 'selected' if mode|default('hybrid') == 'keyword' }}>Keyword</option>
                <option value="semantic" {{ 'selected' if mode|default('hybrid') == 'semantic' }}>Semantic</option>
            </select>
            <a href="{{ url_for('settings.settings_page') }}" class="search-settings-btn" title="LLM Settings" aria-label="LLM Settings"
               hx-get="{{ url_for('settings.settings_page') }}" hx-target="#content" hx-swap="innerHTML" hx-push-url="true">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </a>
            <small class="search-hint" id="search-hint-text">Keyword and semantic search across project knowledge</small>
        </div>
    </form>

    <!-- Recent searches (populated from localStorage) -->
    <div id="recent-searches" style="display:none; margin-top: 0.5rem;">
        <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.35rem;">
            <small style="color: var(--pico-muted-color); font-weight: 600; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.05em;">Recent</small>
            <button onclick="clearRecentSearches()" style="background:none; border:none; color:var(--pico-muted-color); font-size:0.65rem; cursor:pointer; padding:0; text-decoration:underline;" aria-label="Clear recent searches">clear</button>
        </div>
        <div id="recent-searches-list" style="display: flex; gap: 0.35rem; flex-wrap: wrap;"></div>
    </div>
</div>

<script>
/* Mode pill click → update hidden select + active state + tab switching (T-409) */
(function() {
    function initModePills() {
        document.querySelectorAll('.mode-pill').forEach(function(pill) {
            pill.addEventListener('click', function() {
                var mode = pill.dataset.mode;
                document.querySelectorAll('.mode-pill').forEach(function(p) { p.classList.remove('active'); });
                pill.classList.add('active');

                var searchBar = document.getElementById('search-bar');
                var searchResults = document.getElementById('search-results-area');
                var chatContainer = document.getElementById('chat-container');
                var hintText = document.getElementById('search-hint-text');

                if (mode === 'ask') {
                    /* Switch to Ask AI tab */
                    if (searchBar) searchBar.style.display = 'none';
                    if (searchResults) searchResults.style.display = 'none';
                    if (chatContainer) { chatContainer.style.display = 'block'; chatActivate(); }
                    if (hintText) hintText.textContent = 'Interactive AI conversation with RAG context';
                    /* Hide recent searches */
                    var recent = document.getElementById('recent-searches');
                    if (recent) recent.style.display = 'none';
                } else {
                    /* Switch to search mode */
                    if (searchBar) searchBar.style.display = '';
                    if (searchResults) searchResults.style.display = '';
                    if (chatContainer && typeof chatDeactivate === 'function') chatDeactivate();
                    if (hintText) hintText.textContent = 'Keyword and semantic search across project knowledge';
                    document.getElementById('search-mode-select').value = mode;
                }
            });
        });
    }

    /* Run on DOMContentLoaded and after htmx swaps */
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initModePills);
    } else {
        initModePills();
    }

    /* Auto-activate Ask AI tab if URL has mode=ask */
    var urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('mode') === 'ask') {
        setTimeout(function() {
            var askPill = document.querySelector('[data-mode="ask"]');
            if (askPill) askPill.click();
        }, 100);
    }
})();
</script>
